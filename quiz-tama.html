<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玉手箱 미니 모의고사 | Tokyo Career Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#141419;--surface-2:#1c1c24;--surface-3:#22222e;--border:#2a2a35;--text:#e8e8ed;--text-sub:#c0c0d0;--text-dim:#8888a0;--text-muted:#555568;--tama:#34d399;--tama-soft:rgba(52,211,153,0.06);--tama-border:rgba(52,211,153,0.18);--correct:#34d399;--wrong:#ef4444;--solve:#a29bfe;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR','Noto Sans JP',sans-serif;line-height:1.7;font-size:15px;-webkit-font-smoothing:antialiased;}
.wrap{max-width:680px;margin:0 auto;padding:20px 24px 100px;}

/* Header */
.qz-header{padding:24px 0;border-bottom:1px solid var(--border);margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.qz-title{font-size:18px;font-weight:800;letter-spacing:-0.3px;}
.qz-title span{color:var(--tama);}
.qz-timer{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--tama);min-width:70px;text-align:right;}
.qz-timer.warn{color:var(--wrong);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}

/* Progress */
.qz-progress{display:flex;gap:4px;margin-bottom:20px;}
.qz-dot{flex:1;height:4px;border-radius:2px;background:var(--surface-2);transition:background 0.3s;}
.qz-dot.done{background:var(--correct);}.qz-dot.wrong-dot{background:var(--wrong);}.qz-dot.current{background:var(--tama);opacity:0.6;}

/* Card */
.qz-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px 24px;min-height:300px;position:relative;transition:all 0.3s;}
.qz-meta{display:flex;justify-content:space-between;margin-bottom:16px;}
.qz-num{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--tama);text-transform:uppercase;}
.qz-cat{font-size:11px;color:var(--text-muted);padding:2px 10px;background:var(--surface-2);border-radius:6px;}
.qz-q{font-family:'Noto Sans JP','Noto Sans KR',sans-serif;font-size:14px;color:var(--text-sub);line-height:2.0;margin-bottom:20px;white-space:pre-line;}
.qz-opts{display:flex;flex-direction:column;gap:8px;}
.qz-opt{padding:12px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;font-size:13px;color:var(--text-sub);cursor:pointer;transition:all 0.2s;text-align:left;font-family:inherit;line-height:1.6;}
.qz-opt:hover:not(.locked){border-color:var(--tama-border);background:var(--tama-soft);}
.qz-opt.selected{border-color:var(--tama);background:var(--tama-soft);color:var(--text);font-weight:600;}
.qz-opt.locked{cursor:default;}
.qz-opt.is-correct{border-color:var(--correct);background:rgba(52,211,153,0.08);color:var(--correct);}
.qz-opt.is-wrong{border-color:var(--wrong);background:rgba(239,68,68,0.06);color:var(--wrong);opacity:0.7;}

/* Explanation */
.qz-explain{margin-top:16px;padding:16px;background:rgba(162,155,254,0.05);border:1px solid rgba(162,155,254,0.15);border-radius:10px;display:none;}
.qz-explain.show{display:block;}
.qz-explain-label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--solve);margin-bottom:6px;text-transform:uppercase;}
.qz-explain p{font-size:12px;color:var(--text-dim);line-height:1.8;margin:0;}

/* Actions */
.qz-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}
.qz-btn{padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s;border:none;}
.qz-btn-primary{background:var(--tama);color:#0a0a0f;}.qz-btn-primary:hover{opacity:0.9;}
.qz-btn-secondary{background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border);}.qz-btn-secondary:hover{border-color:var(--tama-border);}
.qz-btn:disabled{opacity:0.3;cursor:default;}

/* Start & Result screens */
.qz-start,.qz-result{text-align:center;padding:60px 20px;}
.qz-start h2,.qz-result h2{font-size:24px;font-weight:900;margin-bottom:12px;}
.qz-start p,.qz-result p{font-size:13px;color:var(--text-dim);line-height:1.9;margin-bottom:24px;}
.qz-score{font-family:'Space Grotesk',sans-serif;font-size:64px;font-weight:700;color:var(--tama);line-height:1;}
.qz-score-label{font-size:13px;color:var(--text-muted);margin-top:8px;margin-bottom:24px;}
.qz-breakdown{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:32px;}
.qz-stat{padding:14px 20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;min-width:100px;}
.qz-stat-num{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;}
.qz-stat-num.green{color:var(--correct);}.qz-stat-num.red{color:var(--wrong);}
.qz-stat-label{font-size:10px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}

/* Footer */
.qz-footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--border);text-align:center;}
.qz-footer p{font-size:11px;color:var(--text-muted);}
.qz-footer a{color:var(--tama);text-decoration:none;}.qz-footer a:hover{text-decoration:underline;}

@media(max-width:640px){.qz-card{padding:20px 16px;}.qz-start h2,.qz-result h2{font-size:20px;}.qz-score{font-size:48px;}}
</style>
</head>

<script>
// ============================================================
// 문제 은행 (QUESTION BANK)
// 카테고리: gengo-gab, gengo-images, keisu-shisoku, keisu-zuhyo, keisu-kuukan
// 문제를 추가하려면 이 배열에 객체를 추가하기만 하면 됩니다.
// ============================================================
const BANK = [
// --- 언어: GAB형 논리적독해 ---
{cat:'언어·GAB형',
q:'【본문】「최근 리모트워크 보급에 의해 도심부의 오피스 수요는 감소 경향에 있다. 한편 지방도시에서는 이주자 증가에 따라 코워킹 스페이스 수요가 급증하고 있다.」\n\n【설문】지방도시에서는 리모트워크 보급에 의해 오피스 수요가 감소하고 있다.',
q_jp:'【本文】「近年、リモートワークの普及により、都心部のオフィス需要は減少傾向にある。一方で、地方都市では移住者の増加に伴い、コワーキングスペースの需要が急増している。」\n\n【設問】地方都市では、リモートワークの普及によりオフィス需要が減少している。',
opts:['A. 맞다','B. 틀리다','C. 판단할 수 없다'],
opts_jp:['A. 正しい','B. 誤り','C. 判断できない'],
ans:2,explain:'오피스 수요 감소는 「도심부」. 지방도시는 코워킹 수요 급증이라고만 되어 있고, 오피스 수요 감소 언급 없음.'},

{cat:'언어·GAB형',
q:'【본문】「AI의 진화에 의해 많은 직종에서 업무 효율이 향상되고 있다.」\n\n【설문】AI의 진화에 의해 일부 직종에서는 고용이 감소하고 있다.',
q_jp:'【本文】「AIの進化により、多くの職種で業務効率が向上している。」\n\n【設問】AIの進化により、一部の職種では雇用が減少している。',
opts:['A. 맞다','B. 틀리다','C. 판단할 수 없다'],
opts_jp:['A. 正しい','B. 誤り','C. 判断できない'],
ans:2,explain:'본문은 「업무 효율 향상」만 언급. 고용 감소에 대한 언급은 없으므로 판단 불가.'},

{cat:'언어·GAB형',
q:'【본문】「환경 규제 강화에 따라 많은 제조업 기업이 CO2 배출량 삭감에 힘쓰고 있다. 특히 자동차 업계에서는 EV 판매 비율을 50% 이상으로 하겠다는 목표를 내건 기업이 늘고 있다.」\n\n【설문】모든 자동차 메이커는 2030년까지 EV 판매 비율 50% 이상 목표를 내걸고 있다.',
q_jp:'【本文】「環境規制の強化に伴い、多くの製造業企業がCO2排出量の削減に取り組んでいる。特に自動車業界では、2030年までにEV販売比率を50%以上にする目標を掲げる企業が増えている。」\n\n【設問】すべての自動車メーカーは、2030年までにEV販売比率を50%以上にする目標を掲げている。',
opts:['A. 맞다','B. 틀리다','C. 판단할 수 없다'],
opts_jp:['A. 正しい','B. 誤り','C. 判断できない'],
ans:1,explain:'「늘고 있다(増えている)」이지 「모든(すべての)」기업이라고는 안 했으므로 틀리다.'},

{cat:'언어·GAB형',
q:'【본문】「일본에서는 저출산 고령화가 진행되어 생산연령인구는 감소를 계속하고 있다.」\n\n【설문】일본의 생산연령인구는 저출산 고령화의 영향으로 증가하고 있다.',
q_jp:'【本文】「日本では少子高齢化が進み、生産年齢人口は減少を続けている。」\n\n【設問】日本の生産年齢人口は、少子高齢化の影響で増加している。',
opts:['A. 맞다','B. 틀리다','C. 판단할 수 없다'],
opts_jp:['A. 正しい','B. 誤り','C. 判断できない'],
ans:1,explain:'본문에 「감소를 계속(減少を続けている)」이라고 명확히 반대.'},

// --- 언어: IMAGES형 취지판정 ---
{cat:'언어·IMAGES형',
q:'【본문】「글로벌화에 의해 국제경쟁이 격화되는 가운데, 기업이 지속적으로 성장하기 위해서는 이노베이션이 불가결하다.」\n\n【설문】기업의 지속적 성장에는 이노베이션이 빠질 수 없다.',
q_jp:'【本文】「グローバル化により国際競争が激化する中、企業が持続的に成長するためには、イノベーションが不可欠である。」\n\n【設問】企業の持続的な成長にはイノベーションが欠かせない。',
opts:['A. 필자의 취지','B. 본문에 있지만 취지 아님','C. 본문과 관계없음'],
opts_jp:['A. 筆者の趣旨','B. 本文に述べられているが趣旨ではない','C. 本文とは関係ない'],
ans:0,explain:'본문의 핵심 주장 그 자체. 이노베이션이 불가결하다는 것이 취지.'},

{cat:'언어·IMAGES형',
q:'【본문】「최근 일하는 방식 개혁의 일환으로 많은 기업이 플렉스타임 제도를 도입하고 있다. 이에 의해 종업원 만족도가 향상되었다는 보고가 있다.」\n\n【설문】플렉스타임 제도는 모든 기업에서 도입되어 있다.',
q_jp:'【本文】「近年、働き方改革の一環として、多くの企業がフレックスタイム制度を導入している。これにより、従業員の満足度が向上したという報告がある。」\n\n【設問】フレックスタイム制度は全ての企業で導入されている。',
opts:['A. 필자의 취지','B. 본문에 있지만 취지 아님','C. 본문과 관계없음'],
opts_jp:['A. 筆者の趣旨','B. 本文に述べられているが趣旨ではない','C. 本文とは関係ない'],
ans:2,explain:'「많은 기업(多くの企業)」이지 「전부」라고 하지 않았으므로 본문과 관계없는 주장.'},

// --- 계수: 사칙역산 (수식이므로 jp 동일) ---
{cat:'계수·사칙역산',q:'□ + 37 = 92',opts:['45','55','65','129','該当なし'],ans:1,explain:'□ = 92 - 37 = 55'},
{cat:'계수·사칙역산',q:'□ × 8 = 96',opts:['11','12','13','88','768'],ans:1,explain:'□ = 96 ÷ 8 = 12'},
{cat:'계수·사칙역산',q:'64 - □ = 19',opts:['35','45','55','83','該当なし'],ans:1,explain:'□ = 64 - 19 = 45'},
{cat:'계수·사칙역산',q:'(□ + 7) × 4 = 60',opts:['5','8','12','15','22'],ans:1,explain:'□ + 7 = 60 ÷ 4 = 15 → □ = 15 - 7 = 8'},
{cat:'계수·사칙역산',q:'□ × 0.25 = 7',opts:['1.75','7.25','14','28','175'],ans:3,explain:'□ = 7 ÷ 0.25 = 28. 0.25 = 1/4이므로 □ = 7 × 4 = 28'},
{cat:'계수·사칙역산',q:'48 ÷ □ = 6',opts:['0.125','6','8','42','288'],ans:2,explain:'48 ÷ □ = 6 → □ = 48 ÷ 6 = 8. (□ = 6 × 48 = 288 함정 주의)'},
{cat:'계수·사칙역산',q:'(□ - 5) × 3 = 36',opts:['7','12','15','17','19'],ans:3,explain:'□ - 5 = 36 ÷ 3 = 12 → □ = 12 + 5 = 17'},
{cat:'계수·사칙역산',q:'□ ÷ 0.5 = 18',opts:['9','18.5','36','90','該当なし'],ans:0,explain:'□ = 18 × 0.5 = 9. 0.5로 나누면 2배이므로 □ = 18의 절반 = 9'},

// --- 계수: 도표읽기 ---
{cat:'계수·도표읽기',
q:'【X사 사업부별 매출 (백만엔)】\n식품: 2023년 320 / 2024년 368\n음료: 2023년 280 / 2024년 294\n일용품: 2023년 150 / 2024년 180\n화장품: 2023년 250 / 2024년 240\n\n2024년 식품사업부의 전년대비 매출 증가율은?',
q_jp:'【X社 事業部別売上（百万円）】\n食品: 2023年 320 / 2024年 368\n飲料: 2023年 280 / 2024年 294\n日用品: 2023年 150 / 2024年 180\n化粧品: 2023年 250 / 2024年 240\n\n2024年の食品事業部の前年比売上増加率は？',
opts:['10%','12%','15%','18%','20%'],ans:2,explain:'(368-320)÷320×100 = 48÷320×100 = 15%'},

{cat:'계수·도표읽기',
q:'【Z사 지역별 매출 (억엔)】\n관동: Q1=50, Q2=55, Q3=48, Q4=67 (연간220)\n간사이: Q1=35, Q2=40, Q3=38, Q4=47 (연간160)\n규슈: Q1=20, Q2=22, Q3=19, Q4=29 (연간90)\n합계: 470\n\n연간합계에서 규슈 매출이 차지하는 비율은?',
q_jp:'【Z社 地域別売上（億円）】\n関東: Q1=50, Q2=55, Q3=48, Q4=67（年間220）\n関西: Q1=35, Q2=40, Q3=38, Q4=47（年間160）\n九州: Q1=20, Q2=22, Q3=19, Q4=29（年間90）\n合計: 470\n\n年間合計において九州の売上が占める割合は？',
opts:['15%','17%','19%','21%','23%'],ans:2,explain:'90÷470×100 = 19.14% → 약 19%'},

{cat:'계수·도표읽기',
q:'【Z사 (동일 데이터)】간사이 지역의 분기 평균 매출은?',
q_jp:'【Z社（同データ）】関西地域の四半期平均売上は？',
opts:['36億円','38億円','40億円','42億円','44億円'],ans:2,explain:'간사이 연간 160 ÷ 4 = 40억엔'},

// --- 계수: 표빈칸추측 ---
{cat:'계수·표빈칸',
q:'표의 법칙을 찾아 ?에 들어갈 값은?\n\n| A | B |\n| 3 | 15 |\n| 5 | 25 |\n| 8 | ? |',
q_jp:'表の法則を見つけて？に入る値は？\n\n| A | B |\n| 3 | 15 |\n| 5 | 25 |\n| 8 | ? |',
opts:['35','38','40','45','48'],ans:2,explain:'B = A × 5. 3×5=15, 5×5=25 → 8×5=40'},

{cat:'계수·표빈칸',
q:'표의 법칙을 찾아 ?에 들어갈 값은?\n\n| X | Y | Z |\n| 6 | 5 | 30 |\n| 4 | 9 | 36 |\n| 7 | 8 | ? |',
q_jp:'表の法則を見つけて？に入る値は？\n\n| X | Y | Z |\n| 6 | 5 | 30 |\n| 4 | 9 | 36 |\n| 7 | 8 | ? |',
opts:['15','48','54','56','63'],ans:3,explain:'Z = X × Y. 6×5=30, 4×9=36 → 7×8=56'},

{cat:'계수·표빈칸',
q:'표의 법칙을 찾아 ?에 들어갈 값은?\n\n| A | B | C | 합계 |\n| 15 | 25 | 10 | 50 |\n| 20 | ? | 12 | 50 |\n| 18 | 22 | 10 | 50 |',
q_jp:'表の法則を見つけて？に入る値は？\n\n| A | B | C | 合計 |\n| 15 | 25 | 10 | 50 |\n| 20 | ? | 12 | 50 |\n| 18 | 22 | 10 | 50 |',
opts:['15','18','20','22','28'],ans:1,explain:'각 행의 합계=50. 20+?+12=50 → ?=18'},
// === 추가 문제 (30문 달성) ===
// --- 언어: GAB형 추가 ---
{cat:'언어·GAB형',
q:'【본문】「최근 SNS의 보급에 의해 기업의 마케팅 수법은 크게 변화했다. 종래의 TV 광고에 비해 비용이 낮고 타겟을 좁힐 수 있다는 이점이 있다.」\n\n【설문】SNS 마케팅은 TV 광고보다 효과가 높다.',
q_jp:'【本文】「近年、SNSの普及により企業のマーケティング手法は大きく変化した。従来のテレビ広告に比べ、コストが低くターゲットを絞れるという利点がある。」\n\n【設問】SNSマーケティングはテレビ広告より効果が高い。',

q:'표의 법칙을 찾아 ?에 들어갈 값은?\n\n| A | B | C |\n| 2 | 5 | 12 |\n| 3 | 4 | 13 |\n| 6 | 1 | ? |',

// ============================================================
// 앱 로직
// ============================================================
const QUIZ_SIZE = 10;
const TIME_LIMIT = 300; // 5분

let questions = [];
let current = 0;
let answers = [];
let timer = TIME_LIMIT;
let timerInterval = null;
let questionStartTime = 0;
let phase = 'start';
let lang = 'jp'; // 'jp' or 'ko'

const app = document.getElementById('app');

function getQ(q) { return lang === 'jp' && q.q_jp ? q.q_jp : q.q; }
function getOpts(q) { return lang === 'jp' && q.opts_jp ? q.opts_jp : q.opts; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function startQuiz() {
  questions = shuffle(BANK).slice(0, QUIZ_SIZE);
  current = 0;
  answers = [];
  timer = TIME_LIMIT;
  phase = 'quiz';
  questionStartTime = Date.now();
  timerInterval = setInterval(() => {
    timer--;
    renderTimer();
    if (timer <= 0) { clearInterval(timerInterval); finishQuiz(); }
  }, 1000);
  render();
}

function selectAnswer(idx) {
  if (answers[current] && answers[current].locked) return;
  const q = questions[current];
  const timeSpent = Math.round((Date.now() - questionStartTime) / 1000);
  answers[current] = { selected: idx, correct: idx === q.ans, timeSpent, locked: true };
  render();
}

function nextQuestion() {
  if (current < questions.length - 1) {
    current++;
    questionStartTime = Date.now();
    render();
  } else {
    finishQuiz();
  }
}

function finishQuiz() {
  clearInterval(timerInterval);
  // 미응답 문제 처리
  for (let i = 0; i < questions.length; i++) {
    if (!answers[i]) answers[i] = { selected: -1, correct: false, timeSpent: 0, locked: true };
  }
  phase = 'result';
  render();
}

function renderTimer() {
  const el = document.querySelector('.qz-timer');
  if (el) {
    el.textContent = formatTime(timer);
    el.classList.toggle('warn', timer <= 30);
  }
}

function render() {
  if (phase === 'start') return renderStart();
  if (phase === 'result') return renderResult();
  renderQuiz();
}

function setLang(l){lang=l;render();}

function renderStart() {
  var ja=lang==='jp'?'background:var(--tama);color:#0a0a0f;':'background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border);';
  var ka=lang==='ko'?'background:var(--tama);color:#0a0a0f;':'background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border);';
  app.innerHTML = `
    <div class="qz-start">
      <h2>🎯 <span style="color:var(--tama);">玉手箱</span> 미니 모의고사</h2>
      <p>문제 은행에서 랜덤 ${QUIZ_SIZE}문이 출제됩니다.<br>제한시간 ${TIME_LIMIT/60}분. 언어(GAB/IMAGES)와 계수(사칙역산/도표/표빈칸)가 섞여 나옵니다.<br>실전처럼 빠르게 풀어보세요!</p>
      <div style="display:flex;justify-content:center;gap:4px;margin:20px 0;">
        <button onclick="setLang('jp')" class="qz-btn" style="padding:8px 20px;font-size:12px;${ja}">日本語 (실전)</button>
        <button onclick="setLang('ko')" class="qz-btn" style="padding:8px 20px;font-size:12px;${ka}">한국어 (연습)</button>
      </div>
      <div style="margin-bottom:20px;">
        <span style="font-size:12px;color:var(--text-muted);">문제 은행: ${BANK.length}문 | 출제: ${QUIZ_SIZE}문 | 제한: ${TIME_LIMIT/60}분 | 풀이는 항상 한국어</span>
      </div>
      <button class="qz-btn qz-btn-primary" onclick="startQuiz()" style="font-size:15px;padding:14px 40px;">시작하기</button>
    </div>`;
}

function renderQuiz() {
  const q = questions[current];
  const a = answers[current];
  const locked = a && a.locked;

  let dotsHTML = '';
  for (let i = 0; i < questions.length; i++) {
    let cls = 'qz-dot';
    if (i === current) cls += ' current';
    else if (answers[i]) cls += answers[i].correct ? ' done' : ' wrong-dot';
    dotsHTML += `<div class="${cls}"></div>`;
  }

  let optsHTML = getOpts(q).map((o, i) => {
    let cls = 'qz-opt';
    if (locked) {
      cls += ' locked';
      if (i === q.ans) cls += ' is-correct';
      else if (a && a.selected === i) cls += ' is-wrong';
    } else if (a && a.selected === i) {
      cls += ' selected';
    }
    return `<button class="${cls}" onclick="selectAnswer(${i})">${o}</button>`;
  }).join('');

  let explainHTML = '';
  if (locked) {
    explainHTML = `<div class="qz-explain show">
      <div class="qz-explain-label">풀이</div>
      <p>${q.explain}</p>
    </div>`;
  }

  let actionsHTML = '';
  if (locked) {
    const isLast = current === questions.length - 1;
    actionsHTML = `<div class="qz-actions">
      <button class="qz-btn qz-btn-primary" onclick="${isLast ? 'finishQuiz()' : 'nextQuestion()'}">${isLast ? '결과 보기' : '다음 문제 →'}</button>
    </div>`;
  }

  app.innerHTML = `
    <div class="qz-header">
      <div class="qz-title"><span>玉手箱</span> 미니 모의고사</div>
      <div class="qz-timer${timer<=30?' warn':''}">${formatTime(timer)}</div>
    </div>
    <div class="qz-progress">${dotsHTML}</div>
    <div class="qz-card">
      <div class="qz-meta">
        <div class="qz-num">Q${current+1} / ${questions.length}</div>
        <div class="qz-cat">${q.cat}</div>
      </div>
      <div class="qz-q">${getQ(q)}</div>
      <div class="qz-opts">${optsHTML}</div>
      ${explainHTML}
      ${actionsHTML}
    </div>`;
}

function renderResult() {
  const correctCount = answers.filter(a => a.correct).length;
  const wrongCount = answers.filter(a => !a.correct).length;
  const totalTime = TIME_LIMIT - timer;
  const avgTime = Math.round(totalTime / questions.length);
  const pct = Math.round(correctCount / questions.length * 100);

  // 카테고리별 분석
  const catStats = {};
  questions.forEach((q, i) => {
    if (!catStats[q.cat]) catStats[q.cat] = { total: 0, correct: 0 };
    catStats[q.cat].total++;
    if (answers[i] && answers[i].correct) catStats[q.cat].correct++;
  });
  let catHTML = Object.entries(catStats).map(([cat, s]) => {
    const r = Math.round(s.correct / s.total * 100);
    const color = r >= 70 ? 'var(--correct)' : r >= 40 ? 'var(--tama)' : 'var(--wrong)';
    return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;">
      <span style="color:var(--text-sub);">${cat}</span>
      <span style="color:${color};font-weight:700;">${s.correct}/${s.total} (${r}%)</span>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="qz-result">
      <h2>모의고사 결과</h2>
      <div class="qz-score">${pct}<span style="font-size:24px;color:var(--text-dim);">%</span></div>
      <div class="qz-score-label">${correctCount}문 정답 / ${questions.length}문</div>
      <div class="qz-breakdown">
        <div class="qz-stat"><div class="qz-stat-num green">${correctCount}</div><div class="qz-stat-label">정답</div></div>
        <div class="qz-stat"><div class="qz-stat-num red">${wrongCount}</div><div class="qz-stat-label">오답</div></div>
        <div class="qz-stat"><div class="qz-stat-num" style="color:var(--text-sub);">${avgTime}<span style="font-size:12px;">초</span></div><div class="qz-stat-label">문항 평균</div></div>
        <div class="qz-stat"><div class="qz-stat-num" style="color:var(--text-sub);">${formatTime(totalTime)}</div><div class="qz-stat-label">총 소요</div></div>
      </div>
      <div style="text-align:left;max-width:400px;margin:0 auto 24px;">
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;color:var(--tama);margin-bottom:8px;text-transform:uppercase;">카테고리별 분석</div>
        ${catHTML}
      </div>
      <button class="qz-btn qz-btn-primary" onclick="phase='start';render();" style="font-size:15px;padding:14px 40px;">다시 도전하기</button>
    </div>`;
}

render();
</script>
