<style>
  :root{--bg:#0a0a0f;--surface:#141419;--surface-2:#1c1c24;--border:#2a2a35;--text:#e8e8ed;--text-sub:#c0c0d0;--text-dim:#8888a0;--text-muted:#555568;--accent:#d4a574;--accent-soft:rgba(212,165,116,0.08);--accent-border:rgba(212,165,116,0.22);--warn:#f59e0b;--warn-soft:rgba(245,158,11,0.06);--warn-border:rgba(245,158,11,0.18);--sub1:#4a9eff;--sub1-soft:rgba(74,158,255,0.08);--sub1-border:rgba(74,158,255,0.2);--sub2:#2ecc71;--sub2-soft:rgba(46,204,113,0.08);--sub2-border:rgba(46,204,113,0.2)}
  *{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR','Noto Sans JP',sans-serif;line-height:1.8;font-size:15px;-webkit-font-smoothing:antialiased}.container{max-width:760px;margin:0 auto;padding:0 24px 100px}
  .hero{padding:64px 24px 48px;border-bottom:1px solid var(--border);position:relative;overflow:hidden}.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(212,165,116,0.06) 0%,transparent 70%);pointer-events:none}.hero-inner{position:relative;max-width:760px;margin:0 auto}.hero-label{display:inline-block;font-size:10px;font-weight:700;letter-spacing:3px;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-border);padding:4px 12px;border-radius:12px;margin-bottom:20px;text-transform:uppercase}.hero h1{font-size:30px;font-weight:900;line-height:1.3;margin-bottom:10px}.hero-sub{font-size:13px;color:var(--text-dim);line-height:1.9;margin-bottom:20px;max-width:560px}.hero-tags{display:flex;flex-wrap:wrap;gap:6px}.hero-tag{font-size:11px;padding:4px 12px;border-radius:100px;background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent-border);font-weight:500}.hero-tag.s1{background:var(--sub1-soft);color:var(--sub1);border-color:var(--sub1-border)}.hero-tag.s2{background:var(--sub2-soft);color:var(--sub2);border-color:var(--sub2-border)}
  .hl{color:var(--accent);font-weight:600}.hl-s1{color:var(--sub1);font-weight:600}.hl-s2{color:var(--sub2);font-weight:600}.hl-warn{color:var(--warn);font-weight:600}
  .section-nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 0}.section-nav-inner{max-width:760px;margin:0 auto;padding:0 24px;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}.section-nav-inner::-webkit-scrollbar{display:none}.nav-btn{flex-shrink:0;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:500;color:var(--text-muted);cursor:pointer;border:none;background:none;font-family:inherit;transition:all 0.2s;white-space:nowrap}.nav-btn:hover,.nav-btn.active{color:var(--accent);background:var(--accent-soft)}
  .section{padding:44px 0;border-bottom:1px solid rgba(255,255,255,0.03)}.section:last-child{border-bottom:none}.section-num{font-size:10px;font-weight:700;letter-spacing:3px;color:var(--accent);opacity:0.7;margin-bottom:6px;text-transform:uppercase}.section-title{font-size:20px;font-weight:800;margin-bottom:4px}.section-title-jp{font-family:'Noto Sans JP',sans-serif;font-size:11px;color:var(--text-muted);margin-bottom:20px}.section p{font-size:13px;color:var(--text-sub);line-height:2.0;margin-bottom:14px}.section p:last-child{margin-bottom:0}.section h3{font-size:14px;font-weight:700;color:var(--text-sub);margin:28px 0 12px;padding-left:10px;border-left:2px solid var(--accent)}.section h3.s1{border-left-color:var(--sub1)}.section h3.s2{border-left-color:var(--sub2)}
  .info-box{padding:18px 20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin:16px 0}.info-box-accent{background:var(--accent-soft);border-color:var(--accent-border);border-left:3px solid var(--accent)}.info-box-warn{background:var(--warn-soft);border-color:var(--warn-border);border-left:3px solid var(--warn)}.info-box-s1{background:var(--sub1-soft);border-color:var(--sub1-border);border-left:3px solid var(--sub1)}.info-box-s2{background:var(--sub2-soft);border-color:var(--sub2-border);border-left:3px solid var(--sub2)}.info-box p{font-size:12px;color:var(--text-dim);line-height:1.9;margin-bottom:0}.box-label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--accent);margin-bottom:6px;text-transform:uppercase}.box-label-s1{color:var(--sub1)}.box-label-s2{color:var(--sub2)}.box-label-warn{color:var(--warn)}
  .table-wrap{overflow-x:auto;margin:16px 0}table{width:100%;border-collapse:collapse;font-size:12px}th{background:var(--surface-2);color:var(--text-dim);font-weight:600;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:11px}td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--text-sub);font-size:12px;line-height:1.7}
  .es-pattern{padding:18px 20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin:12px 0}.es-pattern-label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--accent);margin-bottom:8px;text-transform:uppercase}.es-pattern p{font-size:12px;color:var(--text-dim);line-height:1.9;margin-bottom:0}
  .footer{padding:40px 0 60px;border-top:1px solid var(--border);margin-top:20px;text-align:center}.footer p{font-size:11px;color:var(--text-muted);line-height:1.8}.footer .brand{font-weight:700;color:var(--text-dim)}.section-title{font-size:18px}}

  /* ── Job Link Cards ── */
  .job-link-card {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 18px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    transition: all 0.2s;
    margin-bottom: 8px;
  }

  .job-link-card:hover {
    border-color: var(--accent-border);
    background: var(--accent-soft);
  }

  .job-link-icon {
    font-size: 24px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .job-link-body { flex: 1; }

  .job-link-kicker {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .job-link-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .job-link-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.7;
    margin-bottom: 8px;
  }

  .job-link-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .job-link-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 6px;
    background: var(--surface-2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .job-link-arrow {
    font-size: 16px;
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 4px;
  }

  .company-group { margin: 20px 0; }
  .company-group-label { font-size:10px; font-weight:700; letter-spacing:2px; color:var(--text-muted); margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--border); text-transform:uppercase; }
  .company-card { padding:16px 18px; background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; transition:border-color 0.2s; }
  .company-card:hover { border-color:var(--border-hover); }
  .company-card.primary { border-color:var(--accent-border); }
  .company-type { font-size:10px; font-weight:700; color:var(--accent); letter-spacing:1px; margin-bottom:4px; text-transform:uppercase; }
  .company-name { font-size:15px; font-weight:700; color:var(--text); margin-bottom:6px; }
  .company-name-jp { font-family:'Noto Sans JP',sans-serif; font-size:12px; color:var(--text-muted); font-weight:400; margin-left:6px; }
  .company-desc { font-size:12px; color:var(--text-dim); line-height:1.8; }
  .company-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
  .company-tag { font-size:10px; padding:2px 8px; border-radius:6px; background:var(--surface-2); color:var(--text-muted); border:1px solid var(--border); }
  .company-tag.accent { background:var(--accent-soft); color:var(--accent); border-color:var(--accent-border); }

  .keyword-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:16px 0; }
  .keyword-card { padding:14px 16px; background:var(--surface); border:1px solid var(--border); border-radius:10px; }
  .keyword-name { font-size:13px; font-weight:700; color:var(--accent); margin-bottom:4px; }
  .keyword-card-jp { font-family:'Noto Sans JP',sans-serif; font-size:11px; color:var(--text-muted); font-weight:400; margin-bottom:4px; }
  .keyword-desc { font-size:11px; color:var(--text-dim); line-height:1.7; }

  @media(max-width:640px) { .keyword-grid { grid-template-columns:1fr; } .hero h1 { font-size:24px; } .section-title { font-size:18px; } }

</style>
