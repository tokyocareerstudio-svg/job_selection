<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玉手箱 풀 모의고사 | Tokyo Career Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#141419;--surface-2:#1c1c24;--surface-3:#22222e;--border:#2a2a35;--text:#e8e8ed;--text-sub:#c0c0d0;--text-dim:#8888a0;--text-muted:#555568;--tama:#34d399;--tama-soft:rgba(52,211,153,0.06);--tama-border:rgba(52,211,153,0.18);--correct:#34d399;--wrong:#ef4444;--solve:#a29bfe;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR','Noto Sans JP',sans-serif;line-height:1.7;font-size:15px;-webkit-font-smoothing:antialiased;}
.wrap{max-width:680px;margin:0 auto;padding:20px 24px 100px;}

/* Header */
.qz-header{padding:24px 0;border-bottom:1px solid var(--border);margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.qz-title{font-size:18px;font-weight:800;letter-spacing:-0.3px;}
.qz-title span{color:var(--tama);}
.qz-timer{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--tama);min-width:70px;text-align:right;}
.qz-timer.warn{color:var(--wrong);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}

/* Progress */
.qz-progress{display:flex;gap:4px;margin-bottom:20px;}
.qz-dot{flex:1;height:4px;border-radius:2px;background:var(--surface-2);transition:background 0.3s;}
.qz-dot.done{background:var(--correct);}.qz-dot.wrong-dot{background:var(--wrong);}.qz-dot.current{background:var(--tama);opacity:0.6;}

/* Card */
.qz-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px 24px;min-height:300px;position:relative;transition:all 0.3s;}
.qz-meta{display:flex;justify-content:space-between;margin-bottom:16px;}
.qz-num{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--tama);text-transform:uppercase;}
.qz-cat{font-size:11px;color:var(--text-muted);padding:2px 10px;background:var(--surface-2);border-radius:6px;}
.qz-q{font-family:'Noto Sans JP','Noto Sans KR',sans-serif;font-size:14px;color:var(--text-sub);line-height:2.0;margin-bottom:20px;white-space:pre-line;}
.qz-opts{display:flex;flex-direction:column;gap:8px;}
.qz-opt{padding:12px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;font-size:13px;color:var(--text-sub);cursor:pointer;transition:all 0.2s;text-align:left;font-family:inherit;line-height:1.6;}
.qz-opt:hover:not(.locked){border-color:var(--tama-border);background:var(--tama-soft);}
.qz-opt.selected{border-color:var(--tama);background:var(--tama-soft);color:var(--text);font-weight:600;}
.qz-opt.locked{cursor:default;}
.qz-opt.is-correct{border-color:var(--correct);background:rgba(52,211,153,0.08);color:var(--correct);}
.qz-opt.is-wrong{border-color:var(--wrong);background:rgba(239,68,68,0.06);color:var(--wrong);opacity:0.7;}

/* Explanation */
.qz-explain{margin-top:16px;padding:16px;background:rgba(162,155,254,0.05);border:1px solid rgba(162,155,254,0.15);border-radius:10px;display:none;}
.qz-explain.show{display:block;}
.qz-explain-label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--solve);margin-bottom:6px;text-transform:uppercase;}
.qz-explain p{font-size:12px;color:var(--text-dim);line-height:1.8;margin:0;}

/* Actions */
.qz-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}
.qz-btn{padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s;border:none;}
.qz-btn-primary{background:var(--tama);color:#0a0a0f;}.qz-btn-primary:hover{opacity:0.9;}
.qz-btn-secondary{background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border);}.qz-btn-secondary:hover{border-color:var(--tama-border);}
.qz-btn:disabled{opacity:0.3;cursor:default;}

/* Start & Result screens */
.qz-start,.qz-result{text-align:center;padding:60px 20px;}
.qz-start h2,.qz-result h2{font-size:24px;font-weight:900;margin-bottom:12px;}
.qz-start p,.qz-result p{font-size:13px;color:var(--text-dim);line-height:1.9;margin-bottom:24px;}
.qz-score{font-family:'Space Grotesk',sans-serif;font-size:64px;font-weight:700;color:var(--tama);line-height:1;}
.qz-score-label{font-size:13px;color:var(--text-muted);margin-top:8px;margin-bottom:24px;}
.qz-breakdown{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:32px;}
.qz-stat{padding:14px 20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;min-width:100px;}
.qz-stat-num{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;}
.qz-stat-num.green{color:var(--correct);}.qz-stat-num.red{color:var(--wrong);}
.qz-stat-label{font-size:10px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}

/* Footer */
.qz-footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--border);text-align:center;}
.qz-footer p{font-size:11px;color:var(--text-muted);}
.qz-footer a{color:var(--tama);text-decoration:none;}.qz-footer a:hover{text-decoration:underline;}

@media(max-width:640px){.qz-card{padding:20px 16px;}.qz-start h2,.qz-result h2{font-size:20px;}.qz-score{font-size:48px;}}
</style>
</head>

<script>
// ============================================================
// 문제 은행 (QUESTION BANK)
// 카테고리: gengo-gab, gengo-images, keisu-shisoku, keisu-zuhyo, keisu-kuukan

const BANK = [
// --- 언어: GAB형 논리적독해 (실전 길이 장문) ---
{cat:'언어·GAB형',
q:'【본문】최근 많은 기업이 사원의 부업을 허용하기 시작했다. 그 배경에는 종신고용제도의 약체화와 개인의 커리어 자율성에 대한 의식 변화가 있다. 부업을 허용한 기업에서는 사원의 스킬 향상이나 모티베이션 향상이 보고되고 있다. 또한 본업에서는 얻을 수 없는 인맥이나 지식을 획득하여 이노베이션으로 연결하는 사례도 나타나고 있다. 한편 본업에의 집중력 저하나 정보 유출 리스크를 우려하는 목소리도 있다. 특히 경쟁사에서의 부업은 이익상반의 문제가 발생할 수 있어, 대부분의 기업은 일정한 조건 하에서만 부업을 인정하고 있다. 이러한 상황에서 기업은 부업의 메리트를 살리면서 리스크를 관리하는 균형 잡힌 제도 설계가 요구되고 있다.\n\n【설문】부업을 허용한 기업에서는 반드시 사원의 스킬이 향상된다.',
q_jp:'【本文】近年、多くの企業が社員の副業を容認し始めている。その背景には、終身雇用制度の弱体化と個人のキャリア自律性に対する意識変化がある。副業を容認した企業では、社員のスキル向上やモチベーション向上が報告されている。また本業では得られない人脈や知見を獲得し、イノベーションにつなげる事例も出てきた。一方で、本業への集中力低下や情報漏洩リスクを懸念する声もある。特に競合他社での副業は利益相反の問題が生じうるため、大半の企業は一定の条件下でのみ副業を認めている。こうした状況において、企業は副業のメリットを活かしつつリスクを管理するバランスの取れた制度設計が求められている。\n\n【設問】副業を容認した企業では、必ず社員のスキルが向上する。',
opts:['A. 맞다','B. 틀리다','C. 판단할 수 없다'],
opts_jp:['A. 正しい','B. 誤り','C. 判断できない'],
ans:1,explain:'본문은 「スキル向上が報告されている(보고되고 있다)」이지 「반드시 향상된다」는 아님. 보고 = 일부 사례이지 필연이 아님.'},

{cat:'언어·GAB형',
q:'【본문 (위와 동일)】\n\n【설문】경쟁사에서의 부업을 전면 금지하는 기업이 대부분이다.',
q_jp:'【本文（上と同じ）】\n\n【設問】競合他社での副業を全面禁止する企業が大半である。',
opts:['A. 맞다','B. 틀리다','C. 판단할 수 없다'],
opts_jp:['A. 正しい','B. 誤り','C. 判断できない'],
ans:2,explain:'본문은 「일정한 조건 하에서만 인정(一定の条件下でのみ認めている)」이라 했지, 경쟁사 부업을 전면 금지한다고는 안 했음. 판단 불가.'},

{cat:'언어·GAB형',
q:'【본문】일본의 식품 폐기물(食品ロス) 문제는 심각하다. 농림수산성에 따르면 연간 약 523만 톤의 식품이 아직 먹을 수 있는 상태에서 폐기되고 있다. 이는 세계의 식량 원조량의 약 1.2배에 해당한다. 식품 폐기물의 약 절반은 가정에서 발생하며, 나머지 절반은 식품 제조업, 외식 산업, 소매업 등 사업자 측에서 발생한다. 정부는 2030년까지 식품 폐기물을 2000년 대비 반감시키는 목표를 내걸고 있으며, 소비기한 표시의 재검토나 푸드 뱅크 활동의 지원 등 다양한 대책을 추진하고 있다.\n\n【설문】식품 폐기물의 대부분은 사업자 측에서 발생한다.',
q_jp:'【本文】日本の食品ロス問題は深刻である。農林水産省によると、年間約523万トンの食品がまだ食べられる状態で廃棄されている。これは世界の食糧援助量の約1.2倍に相当する。食品ロスの約半分は家庭から発生し、残りの半分は食品製造業、外食産業、小売業など事業者側から発生している。家庭では買いすぎや食べ残しが主な原因であり、事業者側では規格外品の廃棄や返品が大きな割合を占める。政府は2030年までに食品ロスを2000年比で半減させる目標を掲げており、消費期限表示の見直しやフードバンク活動の支援など、さまざまな対策を推進している。こうした官民一体の取り組みが今後の削減効果を左右する。\n\n【設問】食品ロスの大部分は事業者側から発生している。',
opts:['A. 맞다','B. 틀리다','C. 판단할 수 없다'],
opts_jp:['A. 正しい','B. 誤り','C. 判断できない'],
ans:1,explain:'「약 절반은 가정, 나머지 절반은 사업자」이므로 「대부분이 사업자」는 틀리다.'},

{cat:'언어·GAB형',
q:'【본문 (위와 동일)】\n\n【설문】일본의 연간 식품 폐기량은 세계 식량 원조량보다 많다.',
q_jp:'【本文（上と同じ）】\n\n【設問】日本の年間食品廃棄量は世界の食糧援助量より多い。',
opts:['A. 맞다','B. 틀리다','C. 판단할 수 없다'],
opts_jp:['A. 正しい','B. 誤り','C. 判断できない'],
ans:0,explain:'「세계의 식량 원조량의 약 1.2배에 해당(約1.2倍に相当する)」이므로 원조량보다 많다 = 맞다.'},

{cat:'언어·GAB형',
q:'【본문】텔레워크의 보급은 도시부와 지방의 관계에 큰 변화를 가져왔다. 종래에는 도쿄 등 대도시에 오피스를 두고 통근하는 것이 일반적이었으나, 코로나 이후 장소에 구애받지 않는 근무가 가능해졌다. 그 결과, 주거비가 저렴하고 자연 환경이 풍부한 지방으로 이주하는 사람이 증가하고 있다. 그러나 지방 이주자 전원이 텔레워크 종사자인 것은 아니며, 지방 기업에 전직하거나 농업을 시작하는 등 다양한 동기가 있다. 지자체도 이주 촉진을 위해 보조금 제도나 빈집 뱅크 등을 정비하고 있지만, 의료나 교육 등 인프라 면에서의 과제도 남아 있다.\n\n【설문】지방 이주자의 증가는 텔레워크 보급만이 원인이다.',
q_jp:'【本文】テレワークの普及は、都市部と地方の関係に大きな変化をもたらした。従来は東京など大都市にオフィスを構え通勤するのが一般的であったが、コロナ禍以降、場所にとらわれない勤務が可能となった。その結果、住居費が安く自然環境の豊かな地方へ移住する人が増加している。移住相談件数はコロナ前と比較して約3倍に増えたとの調査結果もある。しかし、地方移住者の全員がテレワーク従事者というわけではなく、地方企業への転職や農業を始めるなど多様な動機がある。自治体も移住促進のため補助金制度や空き家バンクなどを整備しているが、医療や教育などインフラ面での課題も残っている。\n\n【設問】地方移住者の増加は、テレワークの普及だけが原因である。',
opts:['A. 맞다','B. 틀리다','C. 판단할 수 없다'],
opts_jp:['A. 正しい','B. 誤り','C. 判断できない'],
ans:1,explain:'「전원이 텔레워크 종사자인 것은 아니며, 전직이나 농업 등 다양한 동기가 있다」고 명확히 부정.'},

{cat:'언어·GAB형',
q:'【본문 (위와 동일)】\n\n【설문】지자체는 이주 촉진을 위해 인프라 정비를 완료했다.',
q_jp:'【本文（上と同じ）】\n\n【設問】自治体は移住促進のためにインフラ整備を完了した。',
opts:['A. 맞다','B. 틀리다','C. 판단할 수 없다'],
opts_jp:['A. 正しい','B. 誤り','C. 判断できない'],
ans:1,explain:'「의료나 교육 등 인프라 면에서의 과제도 남아 있다(課題も残っている)」이므로 완료가 아님.'},

// --- 언어: IMAGES형 취지판정 (실전 길이 장문) ---
{cat:'언어·IMAGES형',
q:'【본문】현대 사회에서 다양성(ダイバーシティ)의 추진은 기업 경영에 불가결한 요소가 되고 있다. 성별, 국적, 연령, 장애의 유무 등에 관계없이 다양한 인재가 활약할 수 있는 환경을 정비하는 것은, 단순히 사회적 책임의 관점뿐 아니라 기업의 경쟁력 강화에도 직결된다. 다양한 시점을 가진 팀은 이노베이션을 창출하기 쉽고, 다양한 고객 니즈에 대응할 수 있기 때문이다. 그러나 다양성의 추진에는 커뮤니케이션 비용의 증가나 의사결정의 지연 등의 과제도 수반된다.\n\n【설문】다양성의 추진은 기업의 경쟁력 강화에 기여한다.',
q_jp:'【本文】現代社会においてダイバーシティの推進は企業経営に不可欠な要素となっている。性別、国籍、年齢、障害の有無等に関わらず多様な人材が活躍できる環境を整備することは、単に社会的責任の観点のみならず、企業の競争力強化にも直結する。多様な視点を持つチームはイノベーションを創出しやすく、多様な顧客ニーズに対応できるからだ。実際に、経営層の多様性が高い企業ほど利益率が上回るという調査結果も複数報告されている。しかし、ダイバーシティの推進にはコミュニケーションコストの増加や意思決定の遅延などの課題も伴い、形だけの多様性では十分な効果は得られない。\n\n【設問】ダイバーシティの推進は企業の競争力強化に寄与する。',
opts:['A. 필자의 취지','B. 본문에 있지만 취지 아님','C. 본문과 관계없음'],
opts_jp:['A. 筆者の趣旨','B. 本文に述べられているが趣旨ではない','C. 本文とは関係ない'],
ans:0,explain:'본문의 핵심 주장 = 다양성 추진이 경쟁력 강화에 직결된다는 것.'},

{cat:'언어·IMAGES형',
q:'【본문 (위와 동일)】\n\n【설문】다양성 추진에는 커뮤니케이션 비용 증가 등의 과제가 있다.',
q_jp:'【本文（上と同じ）】\n\n【設問】ダイバーシティの推進にはコミュニケーションコスト増加などの課題がある。',

function getQ(q) { return lang === 'jp' && q.q_jp ? q.q_jp : q.q; }
function getOpts(q) { return lang === 'jp' && q.opts_jp ? q.opts_jp : q.opts; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function stratifiedPick(pool, n) {
  var byCat = {};
  pool.forEach(function(q) { (byCat[q.cat] = byCat[q.cat] || []).push(q); });
  var cats = Object.keys(byCat);
  cats.forEach(function(c) { byCat[c] = shuffle(byCat[c]); });
  /* 파트 분류: 언어 vs 계수 */
  var langCats = cats.filter(function(c) { return c.indexOf('언어') === 0; });
  var numCats = cats.filter(function(c) { return c.indexOf('계수') === 0; });
  /* 풀 모의고사 비율: 언어 12 : 계수 18 (30문 기준) */
  var langN = Math.round(n * 0.4);
  var numN = n - langN;
  function pickFromCats(catList, total) {
    var picked = [];
    var sCats = shuffle(catList);
    sCats.forEach(function(c) { if (picked.length < total && byCat[c].length > 0) picked.push(byCat[c].shift()); });
    if (picked.length < total) {
      var rest = [];
      sCats.forEach(function(c) { rest = rest.concat(byCat[c]); });
      rest = shuffle(rest);
      while (picked.length < total && rest.length > 0) picked.push(rest.shift());
    }
    return picked;
  }
  var langPicked = pickFromCats(langCats, langN);
  var numPicked = pickFromCats(numCats, numN);
  return shuffle(langPicked.concat(numPicked));
}

function startQuiz() {
  var pool = BANK.filter(function(q){ return !q.mode || q.mode === 'both' || q.mode === mode; });
  questions = stratifiedPick(pool, QUIZ_SIZE);
  current = 0;
  answers = [];
  timer = TIME_LIMIT;
  phase = 'quiz';
  questionStartTime = Date.now();
  timerInterval = setInterval(() => {
    timer--;
    renderTimer();
    if (timer <= 0) { clearInterval(timerInterval); finishQuiz(); }
  }, 1000);
  render();
}

function selectAnswer(idx) {
  if (answers[current] && answers[current].locked) return;
  const q = questions[current];
  const timeSpent = Math.round((Date.now() - questionStartTime) / 1000);
  answers[current] = { selected: idx, correct: idx === q.ans, timeSpent, locked: true };
  render();
}

function nextQuestion() {
  if (current < questions.length - 1) {
    current++;
    questionStartTime = Date.now();
    render();
  } else {
    finishQuiz();
  }
}

function finishQuiz() {
  clearInterval(timerInterval);
  // 미응답 문제 처리
  for (let i = 0; i < questions.length; i++) {
    if (!answers[i]) answers[i] = { selected: -1, correct: false, timeSpent: 0, locked: true };
  }
  phase = 'result';
  render();
}

function renderTimer() {
  const el = document.querySelector('.qz-timer');
  if (el) {
    el.textContent = formatTime(timer);
    el.classList.toggle('warn', timer <= 30);
  }
}

      <div style="margin:0 0 8px;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--tama);text-transform:uppercase;">출제 언어</div>
      <div style="display:flex;justify-content:center;gap:4px;margin:0 0 16px;">
        <button onclick="setLang('jp')" class="qz-btn" style="padding:8px 20px;font-size:12px;${ja}">日本語 (실전)</button>
        <button onclick="setLang('ko')" class="qz-btn" style="padding:8px 20px;font-size:12px;${ka}">한국어 (연습)</button>
      </div>
      <div style="margin-bottom:20px;">
        <span style="font-size:12px;color:var(--text-muted);">문제 은행: ${pool.length}문 | 출제: ${QUIZ_SIZE}문 (언어 12 · 계수 18) | 제한: 25분 | 풀이는 항상 한국어</span>
      </div>
      <button class="qz-btn qz-btn-primary" onclick="startQuiz()" style="font-size:15px;padding:14px 40px;">시작하기</button>
    </div>`;
}

function renderQuiz() {
  const q = questions[current];
  const a = answers[current];
  const locked = a && a.locked;

  let dotsHTML = '';
  for (let i = 0; i < questions.length; i++) {
    let cls = 'qz-dot';
    if (i === current) cls += ' current';
    else if (answers[i]) cls += answers[i].correct ? ' done' : ' wrong-dot';
    dotsHTML += `<div class="${cls}"></div>`;
  }

  let optsHTML = getOpts(q).map((o, i) => {
    let cls = 'qz-opt';
    if (locked) {
      cls += ' locked';
      if (i === q.ans) cls += ' is-correct';
      else if (a && a.selected === i) cls += ' is-wrong';
    } else if (a && a.selected === i) {
      cls += ' selected';
    }
    return `<button class="${cls}" onclick="selectAnswer(${i})">${o}</button>`;
  }).join('');

  let explainHTML = '';
  if (locked) {
    explainHTML = `<div class="qz-explain show">
      <div class="qz-explain-label">풀이</div>
      <p>${q.explain}</p>
    </div>`;
  }

  let actionsHTML = '';
  if (locked) {
    const isLast = current === questions.length - 1;
    actionsHTML = `<div class="qz-actions">
      <button class="qz-btn qz-btn-primary" onclick="${isLast ? 'finishQuiz()' : 'nextQuestion()'}">${isLast ? '결과 보기' : '다음 문제 →'}</button>
    </div>`;
  }

  app.innerHTML = `
    <div class="qz-header">
      <div class="qz-title"><span>玉手箱</span> 풀 모의고사 · ${mode==='web'?'WEB':'C-GAB'}</div>
      <div class="qz-timer${timer<=60?' warn':''}">${formatTime(timer)}</div>
    </div>
    <div class="qz-progress">${dotsHTML}</div>
    <div class="qz-card">
      <div class="qz-meta">
        <div class="qz-num">Q${current+1} / ${questions.length}</div>
        <div class="qz-cat">${q.cat}</div>
      </div>
      <div class="qz-q">${getQ(q)}</div>
      <div class="qz-opts">${optsHTML}</div>
      ${explainHTML}
      ${actionsHTML}
    </div>`;
}

function renderResult() {
  const cc = answers.filter(a => a.correct).length;
  const wc = answers.filter(a => !a.correct).length;
  const tt = TIME_LIMIT - timer;
  const avg = Math.round(tt / questions.length);
  const pct = Math.round(cc / questions.length * 100);
  const hensachi = Math.min(80, Math.max(25, Math.round(50 + (pct - 55) * 0.45)));
  const cs = {};
  questions.forEach((q, i) => { if (!cs[q.cat]) cs[q.cat] = { total: 0, correct: 0 }; cs[q.cat].total++; if (answers[i] && answers[i].correct) cs[q.cat].correct++; });
  let langS={total:0,correct:0}, numS={total:0,correct:0};
  questions.forEach((q,i)=>{ if(q.cat.indexOf('언어')===0){langS.total++;if(answers[i]&&answers[i].correct)langS.correct++;}else{numS.total++;if(answers[i]&&answers[i].correct)numS.correct++;}});
  const langPct=langS.total?Math.round(langS.correct/langS.total*100):0;
  const numPct=numS.total?Math.round(numS.correct/numS.total*100):0;
  let bars=Object.entries(cs).map(([c,s])=>{const r=Math.round(s.correct/s.total*100);const co=r>=70?'var(--correct)':r>=40?'var(--tama)':'var(--wrong)';return`<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;"><span style="color:var(--text-sub);">${c}</span><span style="color:${co};font-weight:700;">${s.correct}/${s.total} (${r}%)</span></div><div style="height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;"><div style="height:100%;width:${r}%;background:${co};border-radius:3px;transition:width 0.5s;"></div></div></div>`;}).join('');
  const catArr=Object.entries(cs).map(([c,s])=>({cat:c,rate:s.correct/s.total}));catArr.sort((a,b)=>a.rate-b.rate);
  const weak=catArr.length>0&&catArr[0].rate<0.5?catArr[0].cat:'없음';
  const strong=catArr.length>0&&catArr[catArr.length-1].rate>=0.5?catArr[catArr.length-1].cat:'없음';
  app.innerHTML=`<div class="qz-result"><h2>풀 모의고사 결과</h2>
<div style="display:flex;justify-content:center;gap:24px;margin:20px 0 8px;flex-wrap:wrap;">
<div><div style="font-size:11px;color:var(--text-muted);letter-spacing:1px;margin-bottom:4px;">종합 정답률</div><div class="qz-score">${pct}<span style="font-size:24px;color:var(--text-dim);">%</span></div></div>
<div><div style="font-size:11px;color:var(--text-muted);letter-spacing:1px;margin-bottom:4px;">예상 편차치</div><div class="qz-score" style="color:${hensachi>=55?'var(--correct)':hensachi>=45?'var(--tama)':'var(--wrong)'};">${hensachi}</div></div>
</div>
<div class="qz-score-label">${cc}문 정답 / ${questions.length}문</div>
<div class="qz-breakdown">
<div class="qz-stat"><div class="qz-stat-num green">${cc}</div><div class="qz-stat-label">정답</div></div>
<div class="qz-stat"><div class="qz-stat-num red">${wc}</div><div class="qz-stat-label">오답</div></div>
<div class="qz-stat"><div class="qz-stat-num" style="color:var(--text-sub);">${avg}<span style="font-size:12px;">초</span></div><div class="qz-stat-label">문항 평균</div></div>
<div class="qz-stat"><div class="qz-stat-num" style="color:var(--text-sub);">${formatTime(tt)}</div><div class="qz-stat-label">총 소요</div></div>
</div>
<div style="display:flex;gap:12px;justify-content:center;margin-bottom:24px;flex-wrap:wrap;">
<div class="qz-stat" style="min-width:130px;"><div class="qz-stat-num" style="color:var(--tama);">${langPct}%</div><div class="qz-stat-label">언어 (${langS.correct}/${langS.total})</div></div>
<div class="qz-stat" style="min-width:130px;"><div class="qz-stat-num" style="color:var(--tama);">${numPct}%</div><div class="qz-stat-label">계수 (${numS.correct}/${numS.total})</div></div>
</div>
<div style="text-align:left;max-width:440px;margin:0 auto 16px;">
<div style="font-size:11px;font-weight:700;letter-spacing:2px;color:var(--tama);margin-bottom:12px;text-transform:uppercase;">유형별 정답률</div>${bars}</div>
<div style="max-width:440px;margin:0 auto 24px;display:flex;gap:12px;">
<div style="flex:1;padding:12px;background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.15);border-radius:8px;text-align:left;"><div style="font-size:10px;font-weight:700;color:var(--wrong);letter-spacing:1px;margin-bottom:4px;">약점 유형</div><div style="font-size:12px;color:var(--text-sub);">${weak}</div></div>
<div style="flex:1;padding:12px;background:rgba(52,211,153,0.05);border:1px solid rgba(52,211,153,0.15);border-radius:8px;text-align:left;"><div style="font-size:10px;font-weight:700;color:var(--correct);letter-spacing:1px;margin-bottom:4px;">강점 유형</div><div style="font-size:12px;color:var(--text-sub);">${strong}</div></div>
</div>
<div style="font-size:11px;color:var(--text-muted);margin-bottom:20px;line-height:1.8;">
※ 예상 편차치는 정답률 기반 간이 추정값입니다. 참고용으로만 활용하세요.<br>
※ 玉手箱는 시간 내 정답 수가 핵심입니다. 모르는 문제는 빠르게 넘기는 연습을 하세요.
</div>
<button class="qz-btn qz-btn-primary" onclick="phase='start';render();" style="font-size:15px;padding:14px 40px;">다시 도전하기</button></div>`;
}

render();
</script>

<script src="spi-nav.js"></script>
<script src="global-nav.js"></script>
</body>
</html>
