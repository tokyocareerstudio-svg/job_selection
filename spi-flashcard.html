/* ═══ 플래시카드 엔진 ═══ */
let deck = [...CARDS];
let idx = 0;
let correctSet = new Set();
let wrongSet = new Set();
let currentFilter = 'all';

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0;
  renderCard();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.fc-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (f === 'all') deck = [...CARDS];
  else if (f === 'wrong') deck = CARDS.filter((c, i) => wrongSet.has(CARDS.indexOf(c)) && !correctSet.has(CARDS.indexOf(c)));
  else deck = CARDS.filter(c => c.cat === f);
  if (deck.length === 0) {
    document.getElementById('fcApp').innerHTML = `<div class="fc-complete"><h2>해당 카드가 없습니다</h2><p>${f === 'wrong' ? '틀린 카드가 없습니다. 전체를 다시 시작하세요!' : '이 카테고리에 카드가 없습니다.'}</p><button class="fc-btn" onclick="setFilter('all')" style="padding:12px 28px;">전체 보기</button></div>`;
    return;
  }
  idx = 0;
  shuffleDeck();
}

function renderCard() {
  updateStats();
  if (idx >= deck.length) {
    document.getElementById('fcApp').innerHTML = `<div class="fc-complete">
      <h2>🎉 한 바퀴 완료!</h2>
      <p>✅ 맞음: ${correctSet.size}장 / ❌ 틀림: ${wrongSet.size - correctSet.size > 0 ? wrongSet.size : 0}장<br>미암기 카드만 필터링하여 반복하세요.</p>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <button class="fc-btn" onclick="idx=0;renderCard();" style="padding:12px 28px;background:var(--spi-soft);color:var(--spi);border-color:var(--spi-border);">처음부터 다시</button>
        <button class="fc-btn" onclick="setFilter('wrong')" style="padding:12px 28px;">미암기만 반복</button>
        <button class="fc-btn" onclick="correctSet.clear();wrongSet.clear();setFilter('all')" style="padding:12px 28px;">초기화 후 전체</button>
      </div>
    </div>`;
    return;
  }
  const c = deck[idx];
  const globalIdx = CARDS.indexOf(c);
  document.getElementById('fcApp').innerHTML = `
    <div class="fc-wrap">
      <div class="fc-card" id="fcCard" onclick="this.classList.toggle('flipped')">
        <div class="fc-face fc-front">
          <div class="fc-cat">${c.cat} · ${c.sub}</div>
          <div class="fc-question">${c.q}</div>
          <div class="fc-hint">카드를 클릭하면 뒤집힙니다</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-cat">${c.cat} · ${c.sub}</div>
          <div class="fc-answer">${c.a}</div>
          <div class="fc-detail">${c.d}</div>
          ${c.ex ? `<div class="fc-example">💡 ${c.ex}</div>` : ''}
        </div>
      </div>
    </div>
    <div class="fc-judge">
      <button class="fc-judge-btn fc-wrong" onclick="markWrong(${globalIdx})">❌ 틀림</button>
      <button class="fc-judge-btn fc-correct" onclick="markCorrect(${globalIdx})">✅ 맞음</button>
    </div>
    <div class="fc-nav">
      <button class="fc-nav-btn" onclick="prev()" ${idx===0?'disabled style="opacity:0.3;"':''}>◀</button>
      <div class="fc-progress">${idx + 1} / ${deck.length}</div>
      <button class="fc-nav-btn" onclick="next()">▶</button>
    </div>`;
}

function markCorrect(gi) { correctSet.add(gi); wrongSet.delete(gi); next(); }
function markWrong(gi) { wrongSet.add(gi); correctSet.delete(gi); next(); }
function next() { idx = Math.min(idx + 1, deck.length); renderCard(); }
function prev() { idx = Math.max(idx - 1, 0); renderCard(); }
function updateStats() {
  document.getElementById('correctCount').textContent = correctSet.size;
  document.getElementById('wrongCount').textContent = wrongSet.size;
}

shuffleDeck();
</script>
<script src="spi-nav.js"></script>
<script src="global-nav.js"></script>
</body>
</html>
