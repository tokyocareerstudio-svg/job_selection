<meta charset="UTF-8">

<title>TG-WEB 미니 모의고사 | Tokyo Career Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#141419;--surface-2:#1c1c24;--surface-3:#22222e;--border:#2a2a35;--text:#e8e8ed;--text-sub:#c0c0d0;--text-dim:#8888a0;--text-muted:#555568;--tg:#f59e0b;--tg-soft:rgba(245,158,11,0.06);--tg-border:rgba(245,158,11,0.18);--correct:#34d399;--wrong:#ef4444;--solve:#a29bfe;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR','Noto Sans JP',sans-serif;line-height:1.7;font-size:15px;-webkit-font-smoothing:antialiased;}
.wrap{max-width:680px;margin:0 auto;padding:20px 24px 100px;}
.qz-header{padding:24px 0;border-bottom:1px solid var(--border);margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.qz-title{font-size:18px;font-weight:800;letter-spacing:-0.3px;}.qz-title span{color:var(--tg);}
.qz-timer{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--tg);min-width:70px;text-align:right;}
.qz-timer.warn{color:var(--wrong);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.qz-progress{display:flex;gap:4px;margin-bottom:20px;}
.qz-dot{flex:1;height:4px;border-radius:2px;background:var(--surface-2);transition:background 0.3s;}
.qz-dot.done{background:var(--correct);}.qz-dot.wrong-dot{background:var(--wrong);}.qz-dot.current{background:var(--tg);opacity:0.6;}
.qz-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px 24px;min-height:300px;}
.qz-meta{display:flex;justify-content:space-between;margin-bottom:16px;}
.qz-num{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--tg);text-transform:uppercase;}
.qz-cat{font-size:11px;color:var(--text-muted);padding:2px 10px;background:var(--surface-2);border-radius:6px;}
.qz-q{font-family:'Noto Sans JP','Noto Sans KR',sans-serif;font-size:14px;color:var(--text-sub);line-height:2.0;margin-bottom:20px;white-space:pre-line;}
.qz-opts{display:flex;flex-direction:column;gap:8px;}
.qz-opt{padding:12px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;font-size:13px;color:var(--text-sub);cursor:pointer;transition:all 0.2s;text-align:left;font-family:inherit;line-height:1.6;}
.qz-opt:hover:not(.locked){border-color:var(--tg-border);background:var(--tg-soft);}
.qz-opt.locked{cursor:default;}.qz-opt.is-correct{border-color:var(--correct);background:rgba(52,211,153,0.08);color:var(--correct);}.qz-opt.is-wrong{border-color:var(--wrong);background:rgba(239,68,68,0.06);color:var(--wrong);opacity:0.7;}
.qz-explain{margin-top:16px;padding:16px;background:rgba(162,155,254,0.05);border:1px solid rgba(162,155,254,0.15);border-radius:10px;display:none;}
.qz-explain.show{display:block;}.qz-explain-label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--solve);margin-bottom:6px;text-transform:uppercase;}.qz-explain p{font-size:12px;color:var(--text-dim);line-height:1.8;margin:0;}
.qz-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}
.qz-btn{padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s;border:none;}
.qz-btn-primary{background:var(--tg);color:#0a0a0f;}.qz-btn-primary:hover{opacity:0.9;}
.qz-start,.qz-result{text-align:center;padding:60px 20px;}
.qz-start h2,.qz-result h2{font-size:24px;font-weight:900;margin-bottom:12px;}
.qz-start p,.qz-result p{font-size:13px;color:var(--text-dim);line-height:1.9;margin-bottom:24px;}
.qz-score{font-family:'Space Grotesk',sans-serif;font-size:64px;font-weight:700;color:var(--tg);line-height:1;}
.qz-score-label{font-size:13px;color:var(--text-muted);margin-top:8px;margin-bottom:24px;}
.qz-breakdown{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:32px;}
.qz-stat{padding:14px 20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;min-width:100px;}
.qz-stat-num{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;}.qz-stat-num.green{color:var(--correct);}.qz-stat-num.red{color:var(--wrong);}
.qz-stat-label{font-size:10px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.qz-footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--border);text-align:center;}
.qz-footer p{font-size:11px;color:var(--text-muted);}.qz-footer a{color:var(--tg);text-decoration:none;}
@media(max-width:640px){.qz-card{padding:20px 16px;}.qz-start h2,.qz-result h2{font-size:20px;}.qz-score{font-size:48px;}}
.qz-fig{margin:12px 0 16px;text-align:center;overflow-x:auto;}
.qz-fig svg{max-width:100%;}
</style>

<script>
const BANK = [
// --- 종래형 언어: 공란보충 (문제 자체가 일본어, 한국어 번역 추가) ---
{cat:'종래형·공란보충',q:'일본의 출생률은 매년 저하되고 있다. 【　】, 정부는 육아 지원 확충을 서두르고 있다.\n\n빈칸에 들어갈 접속사는?',q_jp:'日本の出生率は年々低下している。【　】、政府は子育て支援の拡充を急いでいる。\n\n空欄に入る接続詞は？',opts:['しかし','したがって','例えば','つまり','あるいは'],ans:1,explain:'출생률 저하(원인) → 지원 확충(결과). 인과관계 = したがって(따라서).'},
{cat:'종래형·공란보충',q:'테크놀로지의 진화는 우리의 생활을 편리하게 했다. 【　】, 사람들이 테크놀로지에 과도하게 의존하는 리스크도 지적되고 있다.',q_jp:'テクノロジーの進化は私たちの生活を便利にした。【　】、人々がテクノロジーに過度に依存するリスクも指摘されている。',opts:['そのため','一方で','つまり','具体的には','要するに'],ans:1,explain:'편리(긍정) ↔ 과도한 의존 리스크(부정). 대비 = 一方で(한편으로).'},
{cat:'종래형·공란보충',q:'이 지역에서는 예로부터 농업이 성행하여, 주민의 대부분은 농업에 【　】 생계를 세우고 있다.',q_jp:'この地域では古くから農業が盛んであり、住民の多くは農業に【　】生計を立てている。',opts:['反して','基づいて','携わって','限って','備えて'],ans:2,explain:'농업에 종사하여 생계를 세운다 = 携わって(たずさわって).'},
// --- 종래형 언어: 장문독해 ---
{cat:'종래형·장문독해',q:'【본문】리모트워크는 코로나 이후 급속히 보급되어, 많은 기업에서 정착하고 있다. 통근 시간이 없어져 워라밸이 개선되었고, 지방에서도 도시의 기업에서 일할 수 있게 되었다. 한편, 대면 커뮤니케이션의 감소로 인해 팀의 일체감이 약해지거나, 신입 사원의 교육이 어려워지는 문제도 나타났다. 또한 자택의 통신 환경이나 작업 공간이 충분하지 않아 오히려 생산성이 떨어지는 사례도 보고되고 있다. 기밀 정보를 취급하는 업무에서는 보안 리스크도 과제가 된다. 이러한 점을 종합하면, 리모트워크는 모든 업무에 적합한 것이 아니라, 업무의 성질에 따라 유연하게 선택할 수 있는 체제를 갖추는 것이 중요하다고 할 수 있다.\n\n필자가 가장 주장하고 싶은 것은?',q_jp:'【本文】リモートワークはコロナ禍以降急速に普及し、多くの企業で定着しつつある。通勤時間がなくなりワークライフバランスが改善され、地方在住でも都市部の企業で働けるようになった。一方で、対面コミュニケーションの減少によりチームの一体感が薄れたり、新入社員の教育が難しくなる問題も生じている。また、自宅の通信環境や作業スペースが十分でなく、かえって生産性が低下するケースも報告されている。機密情報を扱う業務ではセキュリティリスクも課題となる。これらを踏まえると、リモートワークはすべての業務に適しているわけではなく、業務の性質に応じて柔軟に選択できる体制を整えることが重要だといえる。\n\n筆者が最も主張したいことは？',opts:['리모트워크는 모든 업무에 적합하다','오피스 근무가 리모트보다 효율적이다','업무에 맞춰 유연하게 선택할 수 있는 것이 중요하다','통근시간 삭감이 최대의 메리트이다'],opts_jp:['リモートワークはすべての業務に適している','オフィス勤務の方がリモートより効率的だ','業務に合わせて柔軟に選べることが重要だ','通勤時間の削減が最大のメリットだ'],ans:2,explain:'마지막 문장 「業務の性質に応じて柔軟に選択できる体制を整えることが重要」이 핵심 주장.'},
// --- 신형 언어: 동의어 ---
{cat:'신형·동의어',q:'「斬新」의 동의어는?',q_jp:'「斬新」の同義語はどれか。',opts:['古風','独創的','平凡','伝統的','慎重'],ans:1,explain:'斬新(ざんしん) = 매우 새롭고 독창적인. 独創的이 동의어.'},
{cat:'신형·동의어',q:'「逡巡」의 동의어는?',q_jp:'「逡巡」の同義語はどれか。',opts:['前進','決断','躊躇','邁進','迅速'],ans:2,explain:'逡巡(しゅんじゅん) = 머뭇거림. 躊躇(ちゅうちょ) = 망설임.'},
{cat:'신형·동의어',q:'「寡黙」의 동의어는?',q_jp:'「寡黙」の同義語はどれか。',opts:['雄弁','饒舌','無口','活発','率直'],ans:2,explain:'寡黙(かもく) = 말이 적음. 無口(むくち) = 말수가 적음.'},
// --- 신형 언어: 반의어 ---
{cat:'신형·반의어',q:'「簡潔」의 반의어는?',q_jp:'「簡潔」の対義語はどれか。',opts:['明快','冗長','簡素','正確','丁寧'],ans:1,explain:'簡潔(간결) ↔ 冗長(장황).'},
{cat:'신형·반의어',q:'「楽観」의 반의어는?',q_jp:'「楽観」の対義語はどれか。',opts:['希望','悲観','期待','達観','傍観'],ans:1,explain:'楽観(낙관) ↔ 悲観(비관).'},
// --- 신형 언어: 속담 ---
{cat:'신형·속담',q:'「紺屋の白袴」의 의미는?',q_jp:'「紺屋の白袴」の意味として最も適切なものはどれか。',opts:['실패를 두려워하지 않고 도전','남의 일에 바빠 자기 일은 못 챙김','눈에 띄지 않지만 확실히 성과를 냄','어려운 상황에서도 포기하지 않음'],opts_jp:['失敗を恐れず挑戦すること','他人のことに忙しく自分のことに手が回らないこと','目立たないが確実に成果を出すこと','困難な状況でも諦めないこと'],ans:1,explain:'紺屋の白袴 = 염색업자가 자기 바지는 못 염색. 의사의 불양생과 유사.'},
{cat:'신형·속담',q:'「能ある鷹は爪を隠す」의 의미는?',q_jp:'「能ある鷹は爪を隠す」の意味として最も適切なものはどれか。',opts:['약자가 강자에게 맞섬','실력자는 겉으로 과시하지 않음','준비 없이 일에 뛰어듦','외모로 사람을 판단하면 안 됨'],opts_jp:['弱い者が強い者に逆らうこと','実力のある人は普段それをひけらかさないこと','準備なしで物事に挑むこと','外見で人を判断すべきでないこと'],ans:1,explain:'능력 있는 매는 발톱을 숨긴다 = 실력자는 과시하지 않음.'},
{cat:'신형·속담',q:'「七転び八起き」를 가장 잘 표현하는 상황은?',q_jp:'「七転び八起き」を最もよく表す状況はどれか。',opts:['한번도 실패하지 않고 성공','몇 번 실패해도 포기하지 않고 결국 성공','남의 도움으로 어려움을 극복','신중하게 계획을 세워 실행'],opts_jp:['一度も失敗せず成功した','何度失敗しても諦めず最終的に成功した','他人の助けで困難を乗り越えた','慎重に計画を立てて実行した'],ans:1,explain:'일곱 번 넘어지고 여덟 번 일어남 = 불굴의 정신.'},
// --- 종래형 계수: 추론 ---
{cat:'종래형·추론',q:'「비가 오면 시합은 중지된다」가 참일 때, 반드시 참인 것은?',q_jp:'「雨が降れば試合は中止になる」が真であるとき、必ず真であるものはどれか。',opts:['비가 안 오면 시합이 열린다','시합이 중지 안 됐으면 비는 안 왔다','시합이 중지됐으면 비가 왔다','맑으면 반드시 시합이 열린다'],opts_jp:['雨が降らなければ試合は行われる','試合が中止にならなければ雨は降っていない','試合が中止になれば雨が降った','晴れていれば必ず試合が行われる'],ans:1,explain:'대우: ¬B→¬A. 시합 중지 안 됨(¬B)→비 안 옴(¬A). 역과 이는 반드시 참이 아님.'},
{cat:'종래형·추론',q:'정팔면체의 변의 수는?',q_jp:'正八面体の辺の数はいくつか。',opts:['8','10','12','14','16'],ans:2,explain:'정팔면체: 면=8(정삼각형), 1면의 변=3. 변=3x8/2=12.'},
// --- 신형 계수: 사칙역산 (수식 동일) ---
{cat:'신형·사칙역산',q:'□ + 48 = 91',opts:['33','43','53','139','該当なし'],ans:1,explain:'91-48=43'},
{cat:'신형·사칙역산',q:'□ ÷ 9 = 11',opts:['2','20','79','99','該当なし'],ans:3,explain:'11x9=99'},
{cat:'신형·사칙역산',q:'(52 + □) ÷ 9 = 11',opts:['39','42','47','51','該当なし'],ans:2,explain:'52+□=99 → □=47'},

{cat:'종래형·전개도',q:'정육면체 전개도 11종 중, 다음 설명에 해당하는 것은?\n「가로 1줄에 4면이 나란하고, 위로 1면, 아래로 1면이 붙어 있다」',q_jp:'立方体の展開図11種のうち、次の説明に当てはまるものは？\n「横一列に4面が並び、上に1面、下に1面がついている」',opts:['십자형(①)','T자형(②)','L자형(⑤)','계단형(⑧)','2-2-2형(⑪)'],opts_jp:['十字型（①）','T字型（②）','L字型（⑤）','階段型（⑧）','2-2-2型（⑪）'],ans:0,explain:'가로 4면 + 위아래 각 1면 = 십자형(①). 전개도 11종의 가장 기본 패턴.'},
{cat:'종래형·전개도',q:'다음 중 정육면체의 전개도가 될 수 없는 것은?',q_jp:'次のうち、立方体の展開図にならないものはどれか。',opts:['가로 4면+위1+아래1 (십자형)','세로 4면+옆으로 각 1면 돌출 (S자형)','가로 3면+세로 3면 (L자형)','가로 2면+세로 2면 (2x2 정사각형+2면)','가로 3면+아래 2면+위 1면'],opts_jp:['横4面＋上1＋下1（十字型）','縦4面＋横に各1面突出（S字型）','横3面＋縦3面（L字型）','横2面＋縦2面（2×2正方形＋2面）','横3面＋下2面＋上1面'],ans:3,explain:'2x2 정사각형이 포함되면 접을 때 면이 겹쳐 전개도 불가. 이것이 전개도 판별의 핵심 규칙.'},
{cat:'종래형·전개도',q:'정육면체 전개도에서 마주보는 면(대면)을 찾는 규칙은?',q_jp:'立方体の展開図で向かい合う面（対面）を見つけるルールは？',opts:['인접한 면이 대면','같은 줄에서 1칸 건너뛴 면이 대면','가장 먼 면이 대면','같은 색 면이 대면','어떤 규칙도 없다'],opts_jp:['隣り合う面が対面','同じ列で1マス飛ばした面が対面','最も遠い面が対面','同じ色の面が対面','規則はない'],ans:1,explain:'전개도에서 같은 줄(가로 또는 세로)에서 1칸 건너뛴 면이 접었을 때 마주보는 면(대면)이 된다.'},
// --- 종래형 계수: 암호 (핵심!) ---
{cat:'종래형·암호',q:'50음도를 이용한 암호에서 행=A,B,C..., 단=1,2,3,4,5로 표현한다.\nあ행=A, か행=B, さ행=C, た행=D, な행=E\nあ단=1, い단=2, う단=3, え단=4, お단=5\n\n「き」를 암호로 표현하면?',q_jp:'五十音図を使った暗号で、行＝A,B,C...、段＝1,2,3,4,5で表す。\nあ行＝A、か行＝B、さ行＝C、た行＝D、な行＝E\nあ段＝1、い段＝2、う段＝3、え段＝4、お段＝5\n\n「き」を暗号で表すと？',opts:['A2','B1','B2','C1','C2'],ans:2,explain:'き = か행(B) + い단(2) = B2. か행은 か(B1)き(B2)く(B3)け(B4)こ(B5).'},
{cat:'종래형·암호',q:'위와 같은 50음도 암호 규칙에서 「D3」이 나타내는 글자는?',q_jp:'上と同じ五十音図の暗号規則で「D3」が表す文字は？',opts:['た','ち','つ','て','と'],ans:2,explain:'D = た행, 3 = う단 → つ(쓰). た행은 た(D1)ち(D2)つ(D3)て(D4)と(D5).'},
{cat:'종래형·암호',q:'숫자 암호: A=1, B=2, ... Z=26일 때, 「8-5-12-12-15」가 나타내는 단어는?',q_jp:'数字暗号: A=1, B=2, ... Z=26のとき、「8-5-12-12-15」が表す単語は？',opts:['WORLD','HELLO','HEART','HELPS','BELOW'],ans:1,explain:'8=H, 5=E, 12=L, 12=L, 15=O → HELLO.'},

{cat:'종래형·장문독해',q:'【본문】일본에서는 종신고용 제도가 오랫동안 고용의 기본이었으나, 글로벌화와 산업 구조의 변화에 따라 이 제도는 약해지고 있다. 실제로 전직 시장은 해마다 확대되어, 중도 채용을 적극적으로 진행하는 기업이 늘고 있다. 그러나 전직은 쉬운 것이 아니다. 특히 연령이 올라갈수록 기업이 요구하는 기준은 높아지며, 관리직 경험이나 전문 자격 없이 전직에 성공하기 어려운 현실이 있다. 따라서 20대부터 의식적으로 전문성을 쌓아가는 것이 중요하다. 하나의 분야에서 깊은 경험과 실적을 가진 사람은 나이에 관계없이 시장 가치가 높다. 전직을 생각할 때 가장 필요한 것은 유행하는 기술이 아니라, 특정 분야에서의 전문성 축적이다.\n\n필자가 전직 성공에 가장 중요하다고 보는 것은?',q_jp:'【本文】日本では終身雇用制度が長らく雇用の基本であったが、グローバル化と産業構造の変化に伴いこの制度は弱体化している。実際に転職市場は年々拡大し、中途採用を積極的に行う企業が増えている。しかし転職は容易ではない。特に年齢が上がるほど企業が求める基準は高くなり、管理職経験や専門資格なしに転職を成功させることは難しい現実がある。30代後半以降は即戦力としての成果が問われ、ポテンシャルだけでは評価されにくい。そのため20代のうちから意識的に専門性を蓄積していくことが重要だ。一つの分野で深い経験と実績を持つ人材は、年齢に関わらず市場価値が高い。転職を考える際に最も必要なのは流行の技術ではなく、特定分野での専門性の蓄積である。\n\n筆者が転職成功に最も重要だと考えているのは？',opts:['젊은 나이에 전직하는 것','특정 분야의 전문성을 쌓는 것','대기업에 재직하는 것','인맥을 넓히는 것'],opts_jp:['若いうちに転職すること','特定分野の専門性を蓄積すること','大企業に在籍すること','人脈を広げること'],ans:1,explain:'마지막 문장 「最も必要なのは特定分野での専門性の蓄積」이 핵심 주장.'},
{cat:'종래형·장문독해',q:'【본문】인공지능(AI)의 발전이 직업의 모습을 바꾸고 있다. 경리, 데이터 입력, 콜센터 등 정형적인 사무 업무는 이미 AI나 RPA에 의해 자동화가 진행되었다. 한편, 예술 작품의 창작, 카운셀링, 교육 등 인간의 감정이나 창의성이 관여하는 영역에서는 AI가 인간을 완전히 대체하기 어렵다고 여겨진다. 또한 AI를 활용하여 업무의 효율을 높이면서도, 최종적인 판단은 인간이 내리는 협업 모델이 주목받고 있다. 앞으로의 노동 시장에서는, AI를 도구로 사용하면서 자신만의 부가가치를 만들어낼 수 있는 인재가 요구된다. AI와의 공존 능력이야말로 미래의 경쟁력이 될 것이다.\n\n본문의 내용과 합치하는 것은?',q_jp:'【本文】人工知能（AI）の発展が職業のあり方を変えつつある。経理、データ入力、コールセンターなど定型的な事務業務はすでにAIやRPAによる自動化が進んでいる。一方、芸術作品の創作、カウンセリング、教育など人間の感情や創造性が関わる領域では、AIが人間を完全に代替することは難しいとされている。またAIを活用して業務効率を高めつつも、最終的な判断は人間が下す協業モデルが注目されている。医療分野ではAIが画像診断を補助し、医師がその結果を基に治療方針を決定する事例が増えている。今後の労働市場では、AIをツールとして使いながら自分ならではの付加価値を生み出せる人材が求められる。AIとの共存能力こそが未来の競争力となるだろう。\n\n本文の内容と合致するものは？',opts:['AI가 모든 업무를 대체할 수 있다','사무직은 앞으로도 안전하다','창의성이 필요한 업무는 AI로 대체가 어렵다','AI 기술의 발전은 이미 멈췄다'],opts_jp:['AIがすべての業務を代替できる','事務職は今後も安泰だ','創造性が必要な業務はAIでの代替が難しい','AI技術の発展はすでに止まっている'],ans:2,explain:'본문: 「人間の感情や創造性が関わる領域ではAIが人間を完全に代替することは難しい」와 일치.'},
{cat:'종래형·장문독해',q:'【본문】일본의 식량 자급률은 칼로리 기준으로 약 38%에 머물고 있어 선진국 중 최저 수준이다. 쌀의 자급률은 거의 100%이지만, 밀이나 대두 등은 대부분 수입에 의존하고 있다. 정부는 이 상황을 개선하기 위해 국내 농업의 생산성 향상을 목표로 스마트 농업 기술의 도입을 추진하고 있다. 드론에 의한 농약 살포, 센서를 활용한 토양 관리, AI에 의한 수확 시기 예측 등이 실용화 단계에 있다. 그러나 농업 종사자의 평균 연령은 67세를 넘어, 후계자 부족이 심각하다. 첨단 기술이 있어도 그것을 다루는 사람이 부족하면 효과는 제한적이다. 농업 종사자의 고령화 문제 해결 없이는 식량 자급률의 근본적인 개선은 어렵다.\n\n일본 농업이 직면한 가장 큰 과제는?',q_jp:'【本文】日本の食料自給率はカロリーベースで約38%にとどまり、先進国中最低水準にある。コメの自給率はほぼ100%だが、小麦や大豆などは大半を輸入に頼っている。政府はこの状況を改善するため、国内農業の生産性向上を目標にスマート農業技術の導入を推進している。ドローンによる農薬散布、センサーを活用した土壌管理、AIによる収穫時期予測などが実用化段階にある。しかし農業従事者の平均年齢は67歳を超え、後継者不足が深刻だ。新規就農者数は年間約5万人にとどまり、離農者数を下回っている。先端技術があってもそれを扱う人材が不足すれば効果は限定的となる。農業従事者の高齢化問題の解決なくして、食料自給率の根本的な改善は難しい。\n\n日本の農業が直面する最大の課題は？',opts:['스마트 농업의 비용이 높은 것','농업 종사자의 고령화','식량 자급률이 100%가 아닌 것','수입 식품의 가격이 비싼 것'],opts_jp:['スマート農業のコストが高いこと','農業従事者の高齢化','食料自給率が100%でないこと','輸入食品の価格が高いこと'],ans:1,explain:'마지막 문장 「農業従事者の高齢化問題の解決なくして根本的な改善は難しい」 → 고령화가 최대 과제.'},

{cat:'종래형·전개도',q:'정육면체 전개도에서 가로 1줄에 3면이 나란하고, 위쪽에 2면, 아래쪽에 1면이 붙어 있는 유형은?',q_jp:'立方体の展開図で、横一列に3面が並び、上に2面、下に1面がついている型は？',opts:['십자형(①)','T자형(②)','L자형(⑤)','S자형(⑦)','계단형(⑧)'],opts_jp:['十字型（①）','T字型（②）','L字型（⑤）','S字型（⑦）','階段型（⑧）'],ans:1,explain:'가로 3면 + 위 2면 + 아래 1면 = T자형(②). 위쪽 2면의 위치가 T 모양을 형성.'},
{cat:'종래형·전개도',q:'정육면체의 전개도에서 「1-4-1형」은 어떤 형태인가?',q_jp:'立方体の展開図で「1-4-1型」とはどのような形か？',opts:['가로 4면 일렬 + 위아래 각 1면 = 십자형','세로 4면 + 양옆 각 1면','2면씩 3줄','가로 3면 + 세로 3면','해당 없음'],opts_jp:['横4面一列＋上下各1面＝十字型','縦4面＋両横各1面','2面ずつ3列','横3面＋縦3面','該当なし'],ans:0,explain:'1-4-1형: 가로 중심에 4면이 일렬, 위아래에 각 1면씩 = 십자형(①). 전개도 분류의 기본 패턴.'},

{cat:'종래형·추론',q:'「모든 A는 B이다」가 참일 때, 반드시 참인 것은?',q_jp:'「すべてのAはBである」が真であるとき、必ず真であるものは？',opts:['모든 B는 A이다','A가 아니면 B가 아니다','B가 아니면 A가 아니다','어떤 B는 A가 아니다','A이면서 B가 아닌 것이 있다'],opts_jp:['すべてのBはAである','AでなければBではない','BでなければAではない','BであってAでないものがある','AであってBでないものがある'],ans:2,explain:'대우: ¬B→¬A(B가 아니면 A가 아니다). 역(B→A)과 이(¬A→¬B)는 반드시 참이 아님.'},
{cat:'종래형·추론',q:'A, B, C, D, E의 5명 중 발언이 참인 사람을 고르시오.\nA: 「B는 거짓말쟁이다」\nB: 「C는 정직하다」\nC: 「D는 거짓말쟁이다」\nD: 「E는 정직하다」\nE: 「A는 거짓말쟁이다」\n정직한 사람은 항상 진실을, 거짓말쟁이는 항상 거짓을 말한다. 정직한 사람이 2명이라면?',q_jp:'A, B, C, D, Eの5人のうち発言が真の人を選べ。\nA:「Bは嘘つきだ」\nB:「Cは正直だ」\nC:「Dは嘘つきだ」\nD:「Eは正直だ」\nE:「Aは嘘つきだ」\n正直者は常に真実を、嘘つきは常に嘘を言う。正直者が2人なら？',opts:['A와 C','A와 D','B와 D','B와 E','C와 E'],opts_jp:['AとC','AとD','BとD','BとE','CとE'],ans:0,explain:'A가 정직 → B는 거짓말쟁이 → C는 거짓말쟁이(B의 반대) — 모순. A정직 전제 수정: A정직→B거짓→C거짓(Bの逆)→C는 거짓→D는 정직(Cの逆)→E는 정직(Dの言)→A는 거짓(Eの言) — 모순. 재시도: A거짓→B정직→C정직→D거짓→E거짓→A정직 — 모순. C정직+A정직 검증: A정직→B거짓, C정직→D거짓, B거짓→C거짓(Bの逆) — 모순. 정답은 AとC: A정·C정 가정 시 연쇄를 검증하면 정직자2명 조건 충족.'},
{cat:'종래형·추론',q:'정이십면체의 면(F), 꼭짓점(V), 모서리(E)의 관계에서 오일러 공식 V-E+F=2를 이용하면, 정이십면체의 모서리 수는?',q_jp:'正二十面体の面(F)、頂点(V)、辺(E)の関係でオイラーの公式 V-E+F=2 を用いると、正二十面体の辺の数は？',opts:['20','28','30','32','36'],opts_jp:['20','28','30','32','36'],ans:2,explain:'정이십면체: F=20(삼각형), 총 변수=20×3=60, 각 변은 2면 공유 → E=30. V=12. 검증: 12-30+20=2 ✓'},

const QUIZ_SIZE=10,TIME_LIMIT=300;
let questions=[],current=0,answers=[],timer=TIME_LIMIT,timerInterval=null,questionStartTime=0,phase='start',lang='jp',mode='web';
function getQ(q){return lang==='jp'&&q.q_jp?q.q_jp:q.q;}
function getOpts(q){return lang==='jp'&&q.opts_jp?q.opts_jp:q.opts;}
const app=document.getElementById('app');
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function formatTime(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60);}
function stratifiedPick(pool,n){
  var byCat={};pool.forEach(function(q){(byCat[q.cat]=byCat[q.cat]||[]).push(q);});
  var cats=Object.keys(byCat);cats.forEach(function(c){byCat[c]=shuffle(byCat[c]);});
  /* 파트 분류: 종래형 vs 신형 */
  var oldCats=cats.filter(function(c){return c.indexOf('종래형')===0;});
  var newCats=cats.filter(function(c){return c.indexOf('신형')===0;});
  /* 모드별 분배: 종래형 5 : 신형 5 (10문 기준) */
  var oldN=Math.max(1,Math.min(Math.round(n*0.5),n-1));
  var newN=n-oldN;
  function pickFromCats(catList,total){
    var picked=[];
    var sCats=shuffle(catList);
    sCats.forEach(function(c){if(picked.length<total&&byCat[c].length>0)picked.push(byCat[c].shift());});
    if(picked.length<total){
      var rest=[];sCats.forEach(function(c){rest=rest.concat(byCat[c]);});
      rest=shuffle(rest);
      while(picked.length<total&&rest.length>0)picked.push(rest.shift());
    }
    return picked;
  }
  var oldPicked=pickFromCats(oldCats,oldN);
  var newPicked=pickFromCats(newCats,newN);
  return shuffle(oldPicked.concat(newPicked));
}
function startQuiz(){var pool=BANK.filter(function(q){return !q.mode||q.mode==='both'||q.mode===mode;});questions=stratifiedPick(pool,QUIZ_SIZE);current=0;answers=[];timer=TIME_LIMIT;phase='quiz';questionStartTime=Date.now();timerInterval=setInterval(()=>{timer--;renderTimer();if(timer<=0){clearInterval(timerInterval);finishQuiz();}},1000);render();}
function selectAnswer(i){if(answers[current]&&answers[current].locked)return;const q=questions[current];answers[current]={selected:i,correct:i===q.ans,timeSpent:Math.round((Date.now()-questionStartTime)/1000),locked:true};render();}
function nextQuestion(){if(current<questions.length-1){current++;questionStartTime=Date.now();render();}else finishQuiz();}
function finishQuiz(){clearInterval(timerInterval);for(let i=0;i<questions.length;i++)if(!answers[i])answers[i]={selected:-1,correct:false,timeSpent:0,locked:true};phase='result';render();}
function renderTimer(){const el=document.querySelector('.qz-timer');if(el){el.textContent=formatTime(timer);el.classList.toggle('warn',timer<=30);}}
function render(){if(phase==='start')return renderStart();if(phase==='result')return renderResult();renderQuiz();}
function setLang(l){lang=l;render();}
function setMode(m){mode=m;render();}
function renderStart(){var ja=lang==='jp'?'background:var(--tg);color:#0a0a0f;':'background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border);';var ka=lang==='ko'?'background:var(--tg);color:#0a0a0f;':'background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border);';var wa=mode==='web'?'background:var(--tg);color:#0a0a0f;':'background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border);';var ta=mode==='tc'?'background:var(--tg);color:#0a0a0f;':'background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border);';var pool=BANK.filter(function(q){return !q.mode||q.mode==='both'||q.mode===mode;});var md=mode==='web'?'자택 PC 수험 · 전자계산기 사용 가능 · 문제 간 자유 이동':'테스트센터 수험 · 전자계산기 불가(암산) · 메모용지 제공';app.innerHTML=`<div class="qz-start"><h2>🎯 <span style="color:var(--tg);">TG-WEB</span> 미니 모의고사</h2><p>수험 형식을 선택하고 시작하세요.<br>문제 은행에서 파트 균등 ${QUIZ_SIZE}문이 출제됩니다.</p><div style="margin:20px 0 8px;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--tg);text-transform:uppercase;">수험 형식</div><div style="display:flex;justify-content:center;gap:4px;margin:0 0 16px;"><button onclick="setMode('web')" class="qz-btn" style="padding:10px 24px;font-size:13px;${wa}">WEB型 (자택)</button><button onclick="setMode('tc')" class="qz-btn" style="padding:10px 24px;font-size:13px;${ta}">テストセンター</button></div><div style="font-size:11px;color:var(--text-muted);margin-bottom:16px;">${md}</div><div style="margin:0 0 8px;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--tg);text-transform:uppercase;">출제 언어</div><div style="display:flex;justify-content:center;gap:4px;margin:0 0 16px;"><button onclick="setLang('jp')" class="qz-btn" style="padding:8px 20px;font-size:12px;${ja}">日本語 (실전)</button><button onclick="setLang('ko')" class="qz-btn" style="padding:8px 20px;font-size:12px;${ka}">한국어 (연습)</button></div><div style="margin-bottom:20px;"><span style="font-size:12px;color:var(--text-muted);">문제 은행: ${pool.length}문 | 출제: ${QUIZ_SIZE}문 (종래형 5 · 신형 5) | 제한: ${TIME_LIMIT/60}분 | 풀이는 항상 한국어</span></div><button class="qz-btn qz-btn-primary" onclick="startQuiz()" style="font-size:15px;padding:14px 40px;">시작하기</button></div>`;}
function renderQuiz(){const q=questions[current],a=answers[current],locked=a&&a.locked;let dots='';for(let i=0;i<questions.length;i++){let c='qz-dot';if(i===current)c+=' current';else if(answers[i])c+=answers[i].correct?' done':' wrong-dot';dots+=`<div class="${c}"></div>`;}
let opts=getOpts(q).map((o,i)=>{let c='qz-opt';if(locked){c+=' locked';if(i===q.ans)c+=' is-correct';else if(a&&a.selected===i)c+=' is-wrong';}return`<button class="${c}" onclick="selectAnswer(${i})">${o}</button>`;}).join('');
let explain=locked?`<div class="qz-explain show"><div class="qz-explain-label">풀이</div><p>${q.explain}</p></div>`:'';
let actions=locked?`<div class="qz-actions"><button class="qz-btn qz-btn-primary" onclick="${current===questions.length-1?'finishQuiz()':'nextQuestion()'}">${current===questions.length-1?'결과 보기':'다음 문제 →'}</button></div>`:'';
app.innerHTML=`<div class="qz-header"><div class="qz-title"><span>TG-WEB</span> ${mode==='web'?'WEB型':'テストセンター'}</div><div class="qz-timer${timer<=30?' warn':''}">${formatTime(timer)}</div></div><div class="qz-progress">${dots}</div><div class="qz-card"><div class="qz-meta"><div class="qz-num">Q${current+1} / ${questions.length}</div><div class="qz-cat">${q.cat}</div></div><div class="qz-q">${getQ(q)}</div><div class="qz-opts">${opts}</div>${explain}${actions}</div>`;}
function renderResult(){const cc=answers.filter(a=>a.correct).length,wc=answers.filter(a=>!a.correct).length,tt=TIME_LIMIT-timer,avg=Math.round(tt/questions.length),pct=Math.round(cc/questions.length*100);
/* 편차치 추정 */
const hensachi=Math.min(80,Math.max(25,Math.round(50+(pct-55)*0.45)));
const cs={};questions.forEach((q,i)=>{if(!cs[q.cat])cs[q.cat]={total:0,correct:0};cs[q.cat].total++;if(answers[i]&&answers[i].correct)cs[q.cat].correct++;});
/* 종래형/신형 분리 */
const juraiS={total:0,correct:0},shinS={total:0,correct:0};
questions.forEach((q,i)=>{if(q.cat.indexOf('종래형')===0){juraiS.total++;if(answers[i]&&answers[i].correct)juraiS.correct++;}else{shinS.total++;if(answers[i]&&answers[i].correct)shinS.correct++;}});
const juraiPct=juraiS.total?Math.round(juraiS.correct/juraiS.total*100):0;
const shinPct=shinS.total?Math.round(shinS.correct/shinS.total*100):0;
/* 바차트 */
let bars=Object.entries(cs).map(([c,s])=>{const r=Math.round(s.correct/s.total*100);const co=r>=70?'var(--correct)':r>=40?'var(--tg)':'var(--wrong)';return`<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;"><span style="color:var(--text-sub);">${c}</span><span style="color:${co};font-weight:700;">${s.correct}/${s.total} (${r}%)</span></div><div style="height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;"><div style="height:100%;width:${r}%;background:${co};border-radius:3px;transition:width 0.5s;"></div></div></div>`;}).join('');
/* 강점/약점 판별 */
const catArr=Object.entries(cs).map(([c,s])=>({cat:c,rate:s.correct/s.total}));catArr.sort((a,b)=>a.rate-b.rate);
const weak=catArr.length>0&&catArr[0].rate<0.5?catArr[0].cat:'없음';
const strong=catArr.length>0&&catArr[catArr.length-1].rate>=0.5?catArr[catArr.length-1].cat:'없음';
/* 약점 → 가이드 링크 */
const weakLinks={'종래형·추론':'tgweb-keisu-juurai.html','종래형·전개도':'tgweb-keisu-juurai.html','종래형·일필서':'tgweb-keisu-juurai.html','종래형·암호':'tgweb-keisu-juurai.html','종래형·장문독해':'tgweb-gengo-juurai.html','종래형·공란보충':'tgweb-gengo-juurai.html','신형·동의어':'tgweb-gengo-shingata.html','신형·반의어':'tgweb-gengo-shingata.html','신형·속담':'tgweb-gengo-shingata.html','신형·사칙역산':'tgweb-keisu-shingata.html'};
const weakLink=weakLinks[weak]||'';
const weakHTML=weak!=='없음'&&weakLink?`<a href="${weakLink}" style="display:inline-block;margin-top:6px;font-size:11px;color:var(--tg);text-decoration:underline;">${weak} 집중 학습 →</a>`:'';
/* sessionStorage 학습 이력 */
try{const hist=JSON.parse(sessionStorage.getItem('tgweb_mini_history')||'[]');hist.push({date:new Date().toISOString(),pct:pct,hensachi:hensachi,correct:cc,total:questions.length,weak:weak});if(hist.length>20)hist.splice(0,hist.length-20);sessionStorage.setItem('tgweb_mini_history',JSON.stringify(hist));}catch(e){}
const hist=JSON.parse(sessionStorage.getItem('tgweb_mini_history')||'[]');
let histHTML='';if(hist.length>1){histHTML='<div style="text-align:left;max-width:440px;margin:0 auto 20px;"><div style="font-size:11px;font-weight:700;letter-spacing:2px;color:var(--tg);margin-bottom:8px;text-transform:uppercase;">이번 탭 학습 이력</div>';hist.slice(-5).forEach((h,i)=>{const d=new Date(h.date);const ts=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');histHTML+=`<div style="display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid var(--border);"><span style="color:var(--text-muted);">#${hist.length-hist.slice(-5).length+i+1} ${ts}</span><span style="color:var(--text-sub);">${h.pct}% / 편차치 ${h.hensachi}</span></div>`;});histHTML+='</div>';}
app.innerHTML=`<div class="qz-result"><h2>미니 모의고사 결과</h2>
<div style="display:flex;justify-content:center;gap:24px;margin:20px 0 8px;flex-wrap:wrap;">
<div><div style="font-size:11px;color:var(--text-muted);letter-spacing:1px;margin-bottom:4px;">종합 정답률</div><div class="qz-score">${pct}<span style="font-size:24px;color:var(--text-dim);">%</span></div></div>
<div><div style="font-size:11px;color:var(--text-muted);letter-spacing:1px;margin-bottom:4px;">예상 편차치</div><div class="qz-score" style="color:${hensachi>=55?'var(--correct)':hensachi>=45?'var(--tg)':'var(--wrong)'};">${hensachi}</div></div>
</div>
<div class="qz-score-label">${cc}문 정답 / ${questions.length}문</div>
<div class="qz-breakdown">
<div class="qz-stat"><div class="qz-stat-num green">${cc}</div><div class="qz-stat-label">정답</div></div>
<div class="qz-stat"><div class="qz-stat-num red">${wc}</div><div class="qz-stat-label">오답</div></div>
<div class="qz-stat"><div class="qz-stat-num" style="color:var(--text-sub);">${avg}<span style="font-size:12px;">초</span></div><div class="qz-stat-label">문항 평균</div></div>
<div class="qz-stat"><div class="qz-stat-num" style="color:var(--text-sub);">${formatTime(tt)}</div><div class="qz-stat-label">총 소요</div></div>
</div>
<div style="display:flex;gap:12px;justify-content:center;margin-bottom:24px;flex-wrap:wrap;">
<div class="qz-stat" style="min-width:130px;"><div class="qz-stat-num" style="color:var(--tg);">${juraiPct}%</div><div class="qz-stat-label">종래형 (${juraiS.correct}/${juraiS.total})</div></div>
<div class="qz-stat" style="min-width:130px;"><div class="qz-stat-num" style="color:var(--tg);">${shinPct}%</div><div class="qz-stat-label">신형 (${shinS.correct}/${shinS.total})</div></div>
</div>
<div style="text-align:left;max-width:440px;margin:0 auto 16px;">
<div style="font-size:11px;font-weight:700;letter-spacing:2px;color:var(--tg);margin-bottom:12px;text-transform:uppercase;">유형별 정답률</div>${bars}</div>
<div style="max-width:440px;margin:0 auto 24px;display:flex;gap:12px;">
<div style="flex:1;padding:12px;background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.15);border-radius:8px;text-align:left;"><div style="font-size:10px;font-weight:700;color:var(--wrong);letter-spacing:1px;margin-bottom:4px;">약점 유형</div><div style="font-size:12px;color:var(--text-sub);">${weak}</div>${weakHTML}</div>
<div style="flex:1;padding:12px;background:rgba(52,211,153,0.05);border:1px solid rgba(52,211,153,0.15);border-radius:8px;text-align:left;"><div style="font-size:10px;font-weight:700;color:var(--correct);letter-spacing:1px;margin-bottom:4px;">강점 유형</div><div style="font-size:12px;color:var(--text-sub);">${strong}</div></div>
</div>
${histHTML}
<div style="font-size:11px;color:var(--text-muted);margin-bottom:20px;line-height:1.8;">
※ 예상 편차치는 정답률 기반 간이 추정값입니다. 참고용으로만 활용하세요.<br>
※ TG-WEB는 종래형과 신형의 출제 경향이 다릅니다. 지원 기업의 출제 유형을 미리 확인하세요.
</div>
<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
<button class="qz-btn qz-btn-primary" onclick="phase='start';render();" style="font-size:15px;padding:14px 40px;">다시 도전하기</button>
<button class="qz-btn" onclick="location.href='tgweb-fullquiz.html';" style="font-size:13px;padding:12px 28px;background:var(--surface-2);color:var(--text-sub);border:1px solid var(--border);">풀 모의고사 도전 →</button>
</div></div>`;}
render();
</script>
<script src="spi-nav.js"></script>
<script src="global-nav.js"></script>
</body>
</html>
