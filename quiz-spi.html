<title>SPI 미니 모의고사 | Tokyo Career Studio</title>

<style>
:root{--bg:#0a0a0f;--surface:#141419;--surface-2:#1c1c24;--surface-3:#22222e;--border:#2a2a35;--text:#e8e8ed;--text-sub:#c0c0d0;--text-dim:#8888a0;--text-muted:#555568;--accent:#4a9eff;--accent-soft:rgba(74,158,255,0.06);--accent-border:rgba(74,158,255,0.18);--correct:#34d399;--wrong:#ef4444;--solve:#a29bfe;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR','Noto Sans JP',sans-serif;line-height:1.7;font-size:15px;-webkit-font-smoothing:antialiased;}
.wrap{max-width:680px;margin:0 auto;padding:20px 24px 100px;}
.qz-header{padding:24px 0;border-bottom:1px solid var(--border);margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.qz-title{font-size:18px;font-weight:800;letter-spacing:-0.3px;}.qz-title span{color:var(--accent);}
.qz-timer{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--accent);min-width:70px;text-align:right;}
.qz-timer.warn{color:var(--wrong);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.qz-progress{display:flex;gap:4px;margin-bottom:20px;}
.qz-dot{flex:1;height:4px;border-radius:2px;background:var(--surface-2);transition:background 0.3s;}
.qz-dot.done{background:var(--correct);}.qz-dot.wrong-dot{background:var(--wrong);}.qz-dot.current{background:var(--accent);opacity:0.6;}
.qz-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px 24px;min-height:300px;}
.qz-meta{display:flex;justify-content:space-between;margin-bottom:16px;}
.qz-num{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;}
.qz-cat{font-size:11px;color:var(--text-muted);padding:2px 10px;background:var(--surface-2);border-radius:6px;}
.qz-q{font-family:'Noto Sans JP','Noto Sans KR',sans-serif;font-size:14px;color:var(--text-sub);line-height:2.0;margin-bottom:20px;white-space:pre-line;}
.qz-opts{display:flex;flex-direction:column;gap:8px;}
.qz-opt{padding:12px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;font-size:13px;color:var(--text-sub);cursor:pointer;transition:all 0.2s;text-align:left;font-family:inherit;line-height:1.6;}
.qz-opt:hover:not(.locked){border-color:var(--accent-border);background:var(--accent-soft);}
.qz-opt.locked{cursor:default;}.qz-opt.is-correct{border-color:var(--correct);background:rgba(52,211,153,0.08);color:var(--correct);}.qz-opt.is-wrong{border-color:var(--wrong);background:rgba(239,68,68,0.06);color:var(--wrong);opacity:0.7;}
.qz-explain{margin-top:16px;padding:16px;background:rgba(162,155,254,0.05);border:1px solid rgba(162,155,254,0.15);border-radius:10px;display:none;}
.qz-explain.show{display:block;}.qz-explain-label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--solve);margin-bottom:6px;text-transform:uppercase;}.qz-explain p{font-size:12px;color:var(--text-dim);line-height:1.8;margin:0;}
.qz-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}
.qz-btn{padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s;border:none;}
.qz-btn-primary{background:var(--accent);color:#0a0a0f;}.qz-btn-primary:hover{opacity:0.9;}
.qz-start,.qz-result{text-align:center;padding:60px 20px;}
.qz-start h2,.qz-result h2{font-size:24px;font-weight:900;margin-bottom:12px;}
.qz-start p,.qz-result p{font-size:13px;color:var(--text-dim);line-height:1.9;margin-bottom:24px;}
.qz-score{font-family:'Space Grotesk',sans-serif;font-size:64px;font-weight:700;color:var(--accent);line-height:1;}
.qz-score-label{font-size:13px;color:var(--text-muted);margin-top:8px;margin-bottom:24px;}
.qz-breakdown{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:32px;}
.qz-stat{padding:14px 20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;min-width:100px;}
.qz-stat-num{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;}.qz-stat-num.green{color:var(--correct);}.qz-stat-num.red{color:var(--wrong);}
.qz-stat-label{font-size:10px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.qz-footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--border);text-align:center;}
.qz-footer p{font-size:11px;color:var(--text-muted);}.qz-footer a{color:var(--accent);text-decoration:none;}
@media(max-width:640px){.qz-card{padding:20px 16px;}.qz-start h2,.qz-result h2{font-size:20px;}.qz-score{font-size:48px;}}
</style>

<script>
const BANK = [
// --- 언어: 어구의 의미 ---
{cat:'언어·어구의 의미',q:'「潤沢」의 의미로 가장 적절한 것은?',q_jp:'「潤沢」の意味として最も適切なものはどれか。',opts:['물건이 풍부한 모양','갑작스러운 변화','건조하고 메마른 모양','느리고 조용한 모양','끈기 있게 노력하는 모양'],opts_jp:['物が豊かなさま','突然の変化','乾燥したさま','ゆっくりと静かなさま','粘り強く努力するさま'],ans:0,explain:'潤沢(じゅんたく) = 물건·자금 등이 풍부하고 넉넉한 모양.'},
{cat:'언어·어구의 의미',q:'「逼迫」의 의미로 가장 적절한 것은?',q_jp:'「逼迫」の意味として最も適切なものはどれか。',opts:['여유가 있는 상태','사태가 급박하게 다가옴','천천히 진행됨','과거를 그리워함','의지가 굳건함'],opts_jp:['余裕がある状態','事態が差し迫ること','ゆっくり進むこと','過去を懐かしむこと','意志が固いこと'],ans:1,explain:'逼迫(ひっぱく) = 사태가 절박하게 다가옴. 재정 핍박 등에 사용.'},
{cat:'언어·어구의 의미',q:'「忌憚」의 의미로 가장 적절한 것은?',q_jp:'「忌憚」の意味として最も適切なものはどれか。',opts:['기뻐서 어쩔 줄 모름','꺼리고 삼감','강하게 주장함','잊어버림','비밀로 함'],opts_jp:['喜びに満ちること','はばかり遠慮すること','強く主張すること','忘れること','秘密にすること'],ans:1,explain:'忌憚(きたん) = 꺼리고 삼감. 「忌憚のないご意見」= 거리낌 없는 의견.'},
// --- 언어: 두 단어 관계 ---
{cat:'언어·두 단어',q:'「寛容 : 厳格」과 같은 관계인 것은?',q_jp:'「寛容 : 厳格」と同じ関係のものはどれか。',opts:['快適 : 不快','勤勉 : 努力','先生 : 教師','動物 : 犬','入口 : 出口'],ans:0,explain:'반의 관계. 관용(너그러움) ↔ 엄격. 쾌적 ↔ 불쾌도 반의 관계.'},
{cat:'언어·두 단어',q:'「医師 : 患者」와 같은 관계인 것은?',q_jp:'「医師 : 患者」と同じ関係のものはどれか。',opts:['教師 : 生徒','病院 : 学校','薬 : 注射','大人 : 子供','勉強 : 授業'],ans:0,explain:'역할 관계(서비스 제공자 : 수혜자). 의사:환자 = 교사:학생.'},
// --- 언어: 장문독해 ---
{cat:'언어·장문독해',
q:'【본문】최근 일본에서는 캐시리스 결제의 보급이 급속히 진행되고 있다. 경제산업성에 따르면 캐시리스 결제 비율은 2023년에 39.3%에 달하며, 정부는 2025년까지 40%를 달성하겠다는 목표를 거의 실현하고 있다. 캐시리스화의 이점으로는 소비자의 편리성 향상, 점포의 현금 관리 비용 삭감, 결제 데이터를 활용한 마케팅 등이 있다. 그러나 고령자를 중심으로 현금 결제를 선호하는 층도 여전히 존재하며, 시스템 장애 시의 결제 불능 리스크나 개인정보 보호에 대한 우려도 지적되고 있다. 캐시리스 사회의 실현에는 이러한 과제에 대한 대응이 불가결하다.\n\n이 본문의 내용과 합치하는 것은?',
q_jp:'【本文】近年、日本ではキャッシュレス決済の普及が急速に進んでいる。経済産業省によると、キャッシュレス決済比率は2023年に39.3%に達し、政府は2025年までに40%を達成するという目標をほぼ実現しつつある。キャッシュレス化の利点としては、消費者の利便性向上、店舗の現金管理コスト削減、決済データを活用したマーケティングなどがある。しかし、高齢者を中心に現金決済を好む層も依然として存在し、システム障害時の決済不能リスクや個人情報保護への懸念も指摘されている。キャッシュレス社会の実現にはこうした課題への対応が不可欠である。\n\n本文の内容と合致するものはどれか。',
opts:['캐시리스 비율은 이미 50%를 넘었다','고령자 대부분이 캐시리스를 이용하고 있다','시스템 장애 시 결제가 불가능해질 리스크가 있다','정부는 캐시리스화에 반대하고 있다','현금 결제는 이미 사라졌다'],
opts_jp:['キャッシュレス比率はすでに50%を超えた','高齢者の大半がキャッシュレスを利用している','システム障害時に決済不能になるリスクがある','政府はキャッシュレス化に反対している','現金決済はすでになくなった'],
ans:2,explain:'본문에 「시스템 장애 시의 결제 불능 리스크(システム障害時の決済不能リスク)」가 지적되고 있다고 명시.'},

{cat:'언어·장문독해',
q:'【본문 (위와 동일)】\n\n이 본문에서 필자가 가장 주장하고 싶은 것은?',
q_jp:'【本文（上と同じ）】\n\n本文で筆者が最も主張したいことは？',
opts:['캐시리스 결제는 보급할 필요가 없다','캐시리스화의 과제를 해결하는 것이 중요하다','현금 결제를 완전히 폐지해야 한다','고령자에게 캐시리스를 강제해야 한다','캐시리스 비율 40% 목표는 달성 불가능하다'],
opts_jp:['キャッシュレス決済は普及する必要がない','キャッシュレス化の課題を解決することが重要だ','現金決済を完全に廃止すべきだ','高齢者にキャッシュレスを強制すべきだ','キャッシュレス比率40%の目標は達成不可能だ'],
ans:1,explain:'마지막 문장 「이러한 과제에 대한 대응이 불가결(課題への対応が不可欠)」이 필자의 핵심 주장.'},

{cat:'언어·장문독해',
q:'【본문】일하는 방식 개혁이 추진되는 가운데, 기업의 인사평가제도도 큰 전환기를 맞고 있다. 종래의 연공서열형 평가에서는 근속연수와 연령에 따라 급여가 상승했지만, 최근에는 성과주의를 도입하는 기업이 늘고 있다. 성과주의에서는 개인의 실적이나 능력에 따라 보수가 결정되기 때문에, 젊은 사원도 높은 성과를 올리면 빠른 승진이 가능하다. 그러나 성과의 정량적 측정이 어려운 직종도 있으며, 단기적 성과에 치우친 평가는 팀워크를 저해할 수 있다는 비판도 있다. 이상적인 평가제도는 성과와 프로세스의 균형을 잡는 것이라 할 수 있다.\n\n연공서열형 평가의 특징으로 본문에서 언급된 것은?',
q_jp:'【本文】働き方改革が推進される中、企業の人事評価制度も大きな転換期を迎えている。従来の年功序列型評価では、勤続年数や年齢に応じて給与が上昇したが、近年は成果主義を導入する企業が増えている。成果主義では個人の実績や能力に応じて報酬が決定されるため、若い社員でも高い成果を上げれば早い昇進が可能だ。しかし、成果の定量的測定が難しい職種もあり、短期的成果に偏った評価はチームワークを阻害しうるという批判もある。理想的な評価制度は、成果とプロセスのバランスを取ることだといえる。\n\n年功序列型評価の特徴として本文で言及されていることは？',
opts:['실적에 따라 급여가 결정된다','근속연수와 연령에 따라 급여가 상승한다','팀워크를 중시한다','젊은 사원의 승진이 빠르다','성과의 정량적 측정이 용이하다'],
opts_jp:['実績に応じて給与が決まる','勤続年数や年齢に応じて給与が上昇する','チームワークを重視する','若い社員の昇進が早い','成果の定量的測定が容易だ'],
ans:1,explain:'「근속연수와 연령에 따라 급여가 상승(勤続年数や年齢に応じて給与が上昇)」이 연공서열형의 특징으로 언급.'},

{cat:'언어·장문독해',
q:'【본문 (위와 동일)】\n\n필자가 이상적이라고 생각하는 평가제도는?',
q_jp:'【本文（上と同じ）】\n\n筆者が理想的と考える評価制度は？',
opts:['연공서열형으로 돌아가는 것','성과만으로 평가하는 것','성과와 프로세스의 균형을 잡는 것','평가제도 자체를 폐지하는 것','팀 단위로만 평가하는 것'],
opts_jp:['年功序列型に戻すこと','成果のみで評価すること','成果とプロセスのバランスを取ること','評価制度自体を廃止すること','チーム単位でのみ評価すること'],
ans:2,explain:'마지막 문장 「성과와 프로세스의 균형을 잡는 것(成果とプロセスのバランスを取ること)」.'},

{cat:'언어·장문독해',
q:'【본문】수면의 질이 건강에 미치는 영향에 대해 최근 연구가 활발히 이루어지고 있다. 충분한 수면을 취하지 못하면 면역 기능이 저하되고, 비만이나 당뇨병 등 생활습관병의 리스크가 높아진다는 것이 밝혀져 있다. 또한 수면 부족은 집중력이나 판단력의 저하를 초래하여 업무 생산성에도 악영향을 미친다. 일본인의 평균 수면 시간은 OECD 가맹국 중 최하위 수준이며, 수면 부족에 의한 경제 손실은 연간 약 15조 엔에 달한다는 시산도 있다. 기업에서도 수면 개선 프로그램을 도입하는 움직임이 확산되고 있다.\n\n본문의 내용과 합치하지 않는 것은?',
q_jp:'【本文】睡眠の質が健康に及ぼす影響について、近年研究が活発に行われている。十分な睡眠を取れないと免疫機能が低下し、肥満や糖尿病など生活習慣病のリスクが高まることが明らかになっている。また、睡眠不足は集中力や判断力の低下を招き、業務生産性にも悪影響を及ぼす。日本人の平均睡眠時間はOECD加盟国中最下位レベルであり、睡眠不足による経済損失は年間約15兆円に上るという試算もある。企業でも睡眠改善プログラムを導入する動きが広がっている。\n\n本文の内容と合致しないものはどれか。',
opts:['수면 부족은 면역 기능 저하를 초래한다','일본인의 수면 시간은 OECD 최하위 수준이다','수면 부족의 경제 손실은 연간 약 15조 엔이다','수면의 질은 건강에 영향을 미치지 않는다','기업에서 수면 개선 프로그램이 확산되고 있다'],
opts_jp:['睡眠不足は免疫機能の低下を招く','日本人の睡眠時間はOECD最下位レベルだ','睡眠不足の経済損失は年間約15兆円だ','睡眠の質は健康に影響を及ぼさない','企業で睡眠改善プログラムが広がっている'],
ans:3,explain:'본문은 수면의 질이 건강에 영향을 미친다고 주장. 「영향을 미치지 않는다」는 본문과 반대.'},

{cat:'언어·장문독해',

q_jp:'【本文】持続可能な社会の実現に向けて、循環型経済（サーキュラーエコノミー）の概念が注目されている。従来の大量生産·大量消費·大量廃棄という一方通行型の経済モデルから脱却し、資源をできるだけ長く使い、廃棄物を最小化することがその核心である。具体的には、製品の修理·再利用·リサイクルを促進し、製品設計段階から廃棄を考慮するアプローチが求められている。欧州ではすでにサーキュラーエコノミーに関する法整備が進んでおり、日本でもプラスチック資源循環促進法が施行されるなど、政策面での対応が始まっている。\n\nサーキュラーエコノミーの核心として本文で言及されていることは？',
opts:['대량생산으로 경제를 성장시키는 것','자원을 오래 사용하고 폐기물을 최소화하는 것','해외에서 자원을 수입하는 것','신제품을 계속 개발하는 것','폐기물을 해외에 수출하는 것'],
opts_jp:['大量生産で経済を成長させること','資源を長く使い廃棄物を最小化すること','海外から資源を輸入すること','新製品を開発し続けること','廃棄物を海外に輸出すること'],

q_jp:'次の文を論理的な順序に並べなさい。\nア. その結果、都市部の地価は上昇を続けている。\nイ. 日本では人口の都市集中が加速している。\nウ. 一方で、地方の過疎化も深刻な社会問題となっている。\nエ. 特に東京圏への一極集中が顕著である。',
opts:['イ→エ→ア→ウ','イ→ア→エ→ウ','エ→イ→ア→ウ','ア→イ→エ→ウ','イ→ウ→エ→ア'],

// --- 웹테 전용: 입력형 (WEBテスティング限定) ---
{cat:'비언어·입력형',mode:'web',
q:'어떤 상품의 원가에 30%의 이익을 붙여 정가를 매기고, 정가에서 200엔 할인하여 판매한 결과, 이익이 70엔이었다. 원가는 몇 엔인가?\n(실제 시험에서는 숫자를 직접 입력합니다)',
q_jp:'ある商品の原価に30%の利益を付けて定価をつけ、定価から200円引きで販売した結果、利益が70円だった。原価はいくらか。\n（実際の試験では数値を直接入力します）',
opts:['800円','900円','1,000円','1,100円','1,200円'],
opts_jp:['800円','900円','1,000円','1,100円','1,200円'],
ans:1,explain:'원가=x, 정가=1.3x, 판매가=1.3x-200, 이익=0.3x-200=70 → 0.3x=270 → x=900엔.'},

{cat:'비언어·입력형',mode:'web',
q:'A, B 2종류의 제품을 합계 50개 구입했다. A는 1개 300엔, B는 1개 500엔으로, 합계 금액이 19,000엔이었다. A는 몇 개 구입했는가?\n(실제 시험에서는 숫자를 직접 입력합니다)',
q_jp:'A, B 2種類の製品を合計50個購入した。Aは1個300円、Bは1個500円で、合計金額が19,000円だった。Aは何個購入したか。\n（実際の試験では数値を直接入力します）',
opts:['20個','25個','30個','35個','40個'],
opts_jp:['20個','25個','30個','35個','40個'],
ans:2,explain:'A+B=50, 300A+500B=19000. B=50-A → 300A+500(50-A)=19000 → 300A+25000-500A=19000 → -200A=-6000 → A=30'},

];

const QUIZ_SIZE = 10;
const TIME_LIMIT = 300;
let questions=[],current=0,answers=[],timer=TIME_LIMIT,timerInterval=null,questionStartTime=0,phase='start',lang='jp',mode='web';
function getQ(q){return lang==='jp'&&q.q_jp?q.q_jp:q.q;}
function getOpts(q){return lang==='jp'&&q.opts_jp?q.opts_jp:q.opts;}
const app=document.getElementById('app');
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function formatTime(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60);}
function startQuiz(){var pool=BANK.filter(function(q){return !q.mode||q.mode==='both'||q.mode===mode;});questions=shuffle(pool).slice(0,QUIZ_SIZE);current=0;answers=[];timer=TIME_LIMIT;phase='quiz';questionStartTime=Date.now();timerInterval=setInterval(()=>{timer--;renderTimer();if(timer<=0){clearInterval(timerInterval);finishQuiz();}},1000);render();}
function selectAnswer(i){if(answers[current]&&answers[current].locked)return;const q=questions[current];answers[current]={selected:i,correct:i===q.ans,timeSpent:Math.round((Date.now()-questionStartTime)/1000),locked:true};render();}
function nextQuestion(){if(current<questions.length-1){current++;questionStartTime=Date.now();render();}else finishQuiz();}
function finishQuiz(){clearInterval(timerInterval);for(let i=0;i<questions.length;i++)if(!answers[i])answers[i]={selected:-1,correct:false,timeSpent:0,locked:true};phase='result';render();}
function renderTimer(){const el=document.querySelector('.qz-timer');if(el){el.textContent=formatTime(timer);el.classList.toggle('warn',timer<=30);}}
function render(){if(phase==='start')return renderStart();if(phase==='result')return renderResult();renderQuiz();}
function setLang(l){lang=l;render();}
function setMode(m){mode=m;render();}
function renderStart(){var ja=lang==='jp'?'background:var(--accent);color:#0a0a0f;':'background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border);';var ka=lang==='ko'?'background:var(--accent);color:#0a0a0f;':'background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border);';var wa=mode==='web'?'background:var(--accent);color:#0a0a0f;':'background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border);';var ta=mode==='tc'?'background:var(--accent);color:#0a0a0f;':'background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border);';var pool=BANK.filter(function(q){return !q.mode||q.mode==='both'||q.mode===mode;});app.innerHTML=`<div class="qz-start"><h2>🎯 <span style="color:var(--accent);">SPI</span> 미니 모의고사</h2><p>수험 형식을 선택하고 시작하세요.<br>문제 은행에서 랜덤 ${QUIZ_SIZE}문이 출제됩니다.</p><div style="margin:20px 0 8px;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;">수험 형식</div><div style="display:flex;justify-content:center;gap:4px;margin:0 0 16px;"><button onclick="setMode('web')" class="qz-btn" style="padding:10px 24px;font-size:13px;${wa}">WEBテスティング</button><button onclick="setMode('tc')" class="qz-btn" style="padding:10px 24px;font-size:13px;${ta}">テストセンター</button></div><div style="font-size:11px;color:var(--text-muted);margin-bottom:16px;">${mode==='web'?'자택 PC 수험 · 전자계산기 사용 가능 · 입력형 출제 가능':'회장 PC 수험 · 전자계산기 불가(암산) · 문장정리/도형 추가 출제'}</div><div style="margin:0 0 8px;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;">출제 언어</div><div style="display:flex;justify-content:center;gap:4px;margin:0 0 16px;"><button onclick="setLang('jp')" class="qz-btn" style="padding:8px 20px;font-size:12px;${ja}">日本語 (실전)</button><button onclick="setLang('ko')" class="qz-btn" style="padding:8px 20px;font-size:12px;${ka}">한국어 (연습)</button></div><div style="margin-bottom:20px;"><span style="font-size:12px;color:var(--text-muted);">문제 은행: ${pool.length}문 | 출제: ${QUIZ_SIZE}문 | 제한: ${TIME_LIMIT/60}분 | 풀이는 항상 한국어</span></div><button class="qz-btn qz-btn-primary" onclick="startQuiz()" style="font-size:15px;padding:14px 40px;">시작하기</button></div>`;}
function renderQuiz(){const q=questions[current],a=answers[current],locked=a&&a.locked;let dots='';for(let i=0;i<questions.length;i++){let c='qz-dot';if(i===current)c+=' current';else if(answers[i])c+=answers[i].correct?' done':' wrong-dot';dots+=`<div class="${c}"></div>`;}
let opts=getOpts(q).map((o,i)=>{let c='qz-opt';if(locked){c+=' locked';if(i===q.ans)c+=' is-correct';else if(a&&a.selected===i)c+=' is-wrong';}return`<button class="${c}" onclick="selectAnswer(${i})">${o}</button>`;}).join('');
let explain=locked?`<div class="qz-explain show"><div class="qz-explain-label">풀이</div><p>${q.explain}</p></div>`:'';
let actions=locked?`<div class="qz-actions"><button class="qz-btn qz-btn-primary" onclick="${current===questions.length-1?'finishQuiz()':'nextQuestion()'}">${current===questions.length-1?'결과 보기':'다음 문제 →'}</button></div>`:'';
app.innerHTML=`<div class="qz-header"><div class="qz-title"><span>SPI</span> ${mode==='web'?'WEBテスティング':'テストセンター'}</div><div class="qz-timer${timer<=30?' warn':''}">${formatTime(timer)}</div></div><div class="qz-progress">${dots}</div><div class="qz-card"><div class="qz-meta"><div class="qz-num">Q${current+1} / ${questions.length}</div><div class="qz-cat">${q.cat}</div></div><div class="qz-q">${getQ(q)}</div><div class="qz-opts">${opts}</div>${explain}${actions}</div>`;}
function renderResult(){const cc=answers.filter(a=>a.correct).length,wc=answers.filter(a=>!a.correct).length,tt=TIME_LIMIT-timer,avg=Math.round(tt/questions.length),pct=Math.round(cc/questions.length*100);const cs={};questions.forEach((q,i)=>{if(!cs[q.cat])cs[q.cat]={total:0,correct:0};cs[q.cat].total++;if(answers[i]&&answers[i].correct)cs[q.cat].correct++;});let ch=Object.entries(cs).map(([c,s])=>{const r=Math.round(s.correct/s.total*100);const co=r>=70?'var(--correct)':r>=40?'var(--accent)':'var(--wrong)';return`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;"><span style="color:var(--text-sub);">${c}</span><span style="color:${co};font-weight:700;">${s.correct}/${s.total} (${r}%)</span></div>`;}).join('');
app.innerHTML=`<div class="qz-result"><h2>모의고사 결과</h2><div class="qz-score">${pct}<span style="font-size:24px;color:var(--text-dim);">%</span></div><div class="qz-score-label">${cc}문 정답 / ${questions.length}문</div><div class="qz-breakdown"><div class="qz-stat"><div class="qz-stat-num green">${cc}</div><div class="qz-stat-label">정답</div></div><div class="qz-stat"><div class="qz-stat-num red">${wc}</div><div class="qz-stat-label">오답</div></div><div class="qz-stat"><div class="qz-stat-num" style="color:var(--text-sub);">${avg}<span style="font-size:12px;">초</span></div><div class="qz-stat-label">문항 평균</div></div><div class="qz-stat"><div class="qz-stat-num" style="color:var(--text-sub);">${formatTime(tt)}</div><div class="qz-stat-label">총 소요</div></div></div><div style="text-align:left;max-width:400px;margin:0 auto 24px;"><div style="font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent);margin-bottom:8px;text-transform:uppercase;">카테고리별 분석</div>${ch}</div><button class="qz-btn qz-btn-primary" onclick="phase='start';render();" style="font-size:15px;padding:14px 40px;">다시 도전하기</button></div>`;}
render();
</script>
<script src="spi-nav.js"></script>
<script src="global-nav.js"></script>
</body>
